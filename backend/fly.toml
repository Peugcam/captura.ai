# Fly.io configuration for GTA Analytics Backend
# Deploy: fly deploy --config backend/fly.toml

app = "gta-analytics-backend"
primary_region = "gru"  # São Paulo, Brazil

# Build configuration
[build]
  dockerfile = "Dockerfile"

# Environment variables
[env]
  GATEWAY_URL = "http://gta-analytics-gateway.internal:8000"
  GATEWAY_IPC_MODE = "http"  # Use Unix sockets when running on same machine
  GAME_TYPE = "gta"
  ENABLE_OCR_FILTER = "true"
  ENABLE_ROI = "true"
  ROI_X = "0.75"
  ROI_Y = "0"
  ROI_WIDTH = "0.25"
  ROI_HEIGHT = "0.35"
  USE_ADVANCED_PROMPT = "false"
  USE_LITELLM = "true"  # Enable LiteLLM for multi-model support

# HTTP service configuration
[[services]]
  internal_port = 3000
  protocol = "tcp"
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

  # HTTP ports
  [[services.ports]]
    port = 80
    handlers = ["http"]
    force_https = true

  [[services.ports]]
    port = 443
    handlers = ["tls", "http"]

  # Health checks
  [services.concurrency]
    type = "connections"
    hard_limit = 500
    soft_limit = 400

  [[services.tcp_checks]]
    interval = "15s"
    timeout = "10s"
    grace_period = "15s"

  [[services.http_checks]]
    interval = "30s"
    timeout = "15s"
    grace_period = "20s"
    method = "get"
    path = "/health"
    protocol = "http"

# VM resources (more CPU for Vision API processing)
[vm]
  cpu_kind = "shared"
  cpus = 2
  memory_mb = 1024

# Persistent storage for exports
[mounts]
  source = "gta_exports"
  destination = "/app/exports"

# Metrics
[metrics]
  port = 9091
  path = "/metrics"
