<!DOCTYPE html>
<html>
<head>
    <title>Teste Simples de Cliques</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
            background: #1a1a2e;
            color: white;
        }
        .player-box {
            width: 50px;
            height: 50px;
            background: green;
            margin: 10px;
            cursor: pointer;
            display: inline-block;
            text-align: center;
            line-height: 50px;
            border-radius: 5px;
        }
        .player-box.dead {
            background: gray;
        }
        #log {
            margin-top: 20px;
            background: black;
            padding: 10px;
            border-radius: 5px;
            font-family: monospace;
        }
    </style>
</head>
<body>
    <h1>Teste de Cliques - Versão Simplificada</h1>
    <p>Clique nas caixas verdes abaixo:</p>

    <div id="container">
        <div class="player-box alive" data-name="Player1" data-alive="true">P1</div>
        <div class="player-box alive" data-name="Player2" data-alive="true">P2</div>
        <div class="player-box alive" data-name="Player3" data-alive="true">P3</div>
    </div>

    <div id="log"></div>

    <script>
        function log(msg) {
            const logDiv = document.getElementById('log');
            const time = new Date().toLocaleTimeString();
            logDiv.innerHTML += `[${time}] ${msg}<br>`;
        }

        log('✅ Script carregado');

        const container = document.getElementById('container');

        container.addEventListener('click', function(event) {
            log('🖱️ Click event fired on: ' + event.target.tagName);

            const playerBox = event.target.closest('.player-box');

            if (!playerBox) {
                log('⚠️ No player-box found');
                return;
            }

            const playerName = playerBox.dataset.name;
            const isAlive = playerBox.dataset.alive === 'true';

            log(`🎯 Clicked on ${playerName}, alive: ${isAlive}`);

            // Toggle status
            if (isAlive) {
                playerBox.classList.remove('alive');
                playerBox.classList.add('dead');
                playerBox.dataset.alive = 'false';
                log(`💀 ${playerName} marcado como MORTO`);
            } else {
                playerBox.classList.remove('dead');
                playerBox.classList.add('alive');
                playerBox.dataset.alive = 'true';
                log(`✅ ${playerName} marcado como VIVO`);
            }
        });

        log('✅ Event listener adicionado ao container');
    </script>
</body>
</html>
