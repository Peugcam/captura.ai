<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎮 GTA Battle Royale - Analytics V2</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Courier New', 'Consolas', monospace;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 50%, #16213e 100%);
            min-height: 100vh;
            padding: 20px;
            color: #00ff41;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .header {
            background: rgba(0, 0, 0, 0.85);
            border: 3px solid #00ff41;
            border-radius: 10px;
            padding: 30px;
            margin-bottom: 20px;
            box-shadow: 0 0 30px rgba(0, 255, 65, 0.3), inset 0 0 20px rgba(0, 255, 65, 0.1);
            position: relative;
            overflow: hidden;
        }

        .header::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 2px;
            background: linear-gradient(90deg, transparent, #00ff41, transparent);
            animation: scan 3s linear infinite;
        }

        @keyframes scan {
            0% { left: -100%; }
            100% { left: 200%; }
        }

        .header h1 {
            color: #00ff41;
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 0 0 10px #00ff41, 0 0 20px #00ff41;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .header p {
            color: #0af;
            font-size: 1.1em;
            text-shadow: 0 0 5px #0af;
        }

        .status-badge {
            display: inline-block;
            padding: 5px 15px;
            border: 2px solid;
            border-radius: 5px;
            font-size: 0.9em;
            font-weight: bold;
            margin-left: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .status-online {
            background: rgba(0, 255, 65, 0.2);
            color: #00ff41;
            border-color: #00ff41;
            box-shadow: 0 0 10px rgba(0, 255, 65, 0.5);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.6; }
        }

        .status-offline {
            background: rgba(255, 0, 0, 0.2);
            color: #ff0040;
            border-color: #ff0040;
            box-shadow: 0 0 10px rgba(255, 0, 64, 0.3);
        }

        .controls {
            background: rgba(0, 0, 0, 0.8);
            border: 2px solid #0af;
            border-radius: 10px;
            padding: 30px;
            margin-bottom: 20px;
            box-shadow: 0 0 20px rgba(0, 170, 255, 0.3), inset 0 0 10px rgba(0, 170, 255, 0.1);
        }

        .btn-group {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
        }

        button {
            flex: 1;
            padding: 20px;
            font-size: 1.2em;
            border: 3px solid;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            font-family: 'Courier New', monospace;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }

        button::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.3);
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }

        button:hover::before {
            width: 300px;
            height: 300px;
        }

        .btn-start {
            background: rgba(0, 255, 65, 0.1);
            color: #00ff41;
            border-color: #00ff41;
            box-shadow: 0 0 20px rgba(0, 255, 65, 0.3);
        }

        .btn-start:hover {
            background: rgba(0, 255, 65, 0.2);
            box-shadow: 0 0 30px rgba(0, 255, 65, 0.6);
            transform: translateY(-2px);
        }

        .btn-stop {
            background: rgba(255, 0, 64, 0.1);
            color: #ff0040;
            border-color: #ff0040;
            box-shadow: 0 0 20px rgba(255, 0, 64, 0.3);
        }

        .btn-stop:hover {
            background: rgba(255, 0, 64, 0.2);
            box-shadow: 0 0 30px rgba(255, 0, 64, 0.6);
            transform: translateY(-2px);
        }

        .btn-export {
            background: rgba(255, 170, 0, 0.1);
            color: #ffaa00;
            border-color: #ffaa00;
            box-shadow: 0 0 20px rgba(255, 170, 0, 0.3);
        }

        .btn-export:hover {
            background: rgba(255, 170, 0, 0.2);
            box-shadow: 0 0 30px rgba(255, 170, 0, 0.6);
            transform: translateY(-2px);
        }

        .btn-reset {
            background: rgba(138, 43, 226, 0.1);
            color: #8a2be2;
            border-color: #8a2be2;
            box-shadow: 0 0 20px rgba(138, 43, 226, 0.3);
        }

        .btn-reset:hover {
            background: rgba(138, 43, 226, 0.2);
            box-shadow: 0 0 30px rgba(138, 43, 226, 0.6);
            transform: translateY(-2px);
        }

        .btn-start:disabled, .btn-stop:disabled, .btn-export:disabled, .btn-reset:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-top: 20px;
        }

        .stat-card {
            background: rgba(0, 0, 0, 0.6);
            border: 2px solid #00ff41;
            padding: 20px;
            border-radius: 5px;
            box-shadow: 0 0 15px rgba(0, 255, 65, 0.2), inset 0 0 10px rgba(0, 255, 65, 0.05);
            text-align: center;
            transition: all 0.3s;
        }

        .stat-card:hover {
            border-color: #0af;
            box-shadow: 0 0 25px rgba(0, 170, 255, 0.4);
            transform: translateY(-3px);
        }

        .stat-value {
            color: #00ff41;
            font-size: 2.5em;
            font-weight: bold;
            margin: 10px 0;
            text-shadow: 0 0 10px #00ff41;
        }

        .stat-label {
            color: #0af;
            font-size: 0.9em;
            text-transform: uppercase;
            letter-spacing: 1px;
            text-shadow: 0 0 5px #0af;
        }

        .events-panel {
            background: rgba(0, 0, 0, 0.8);
            border: 2px solid #ff0040;
            border-radius: 10px;
            padding: 30px;
            margin-bottom: 20px;
            box-shadow: 0 0 20px rgba(255, 0, 64, 0.3), inset 0 0 10px rgba(255, 0, 64, 0.1);
            max-height: 600px;
            overflow-y: auto;
        }

        .events-panel::-webkit-scrollbar {
            width: 10px;
        }

        .events-panel::-webkit-scrollbar-track {
            background: rgba(0, 0, 0, 0.5);
        }

        .events-panel::-webkit-scrollbar-thumb {
            background: #ff0040;
            border-radius: 5px;
            box-shadow: 0 0 5px #ff0040;
        }

        .events-panel h2 {
            color: #ff0040;
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 0 0 10px #ff0040;
        }

        .event-item {
            background: rgba(0, 0, 0, 0.6);
            border: 1px solid #00ff41;
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 10px;
            border-left: 4px solid #ff0040;
            color: #00ff41;
            transition: all 0.3s;
        }

        .event-item:hover {
            border-left-width: 8px;
            box-shadow: 0 0 15px rgba(255, 0, 64, 0.3);
            transform: translateX(5px);
        }

        .event-item.combo {
            border-left-color: #ffaa00;
            box-shadow: 0 0 10px rgba(255, 170, 0, 0.2);
        }

        .event-header {
            font-weight: bold;
            color: #0af;
            margin-bottom: 5px;
            text-shadow: 0 0 5px #0af;
        }

        .event-details {
            color: #00ff41;
            font-size: 0.9em;
        }

        .event-time {
            color: #0af;
            font-size: 0.8em;
            margin-top: 5px;
            text-shadow: 0 0 3px #0af;
        }

        .log-panel {
            background: rgba(0, 0, 0, 0.8);
            border: 2px solid #ffaa00;
            border-radius: 10px;
            padding: 30px;
            box-shadow: 0 0 20px rgba(255, 170, 0, 0.3), inset 0 0 10px rgba(255, 170, 0, 0.1);
        }

        .log-panel h2 {
            color: #ffaa00;
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 0 0 10px #ffaa00;
        }

        .log-content {
            background: rgba(0, 0, 0, 0.9);
            border: 1px solid #00ff41;
            color: #00ff41;
            padding: 20px;
            border-radius: 5px;
            max-height: 400px;
            overflow-y: auto;
            font-family: 'Courier New', monospace;
            font-size: 0.9em;
        }

        .log-content::-webkit-scrollbar {
            width: 8px;
        }

        .log-content::-webkit-scrollbar-track {
            background: rgba(0, 0, 0, 0.5);
        }

        .log-content::-webkit-scrollbar-thumb {
            background: #ffaa00;
            border-radius: 4px;
            box-shadow: 0 0 5px #ffaa00;
        }

        .log-entry {
            padding: 5px 0;
            border-bottom: 1px solid rgba(0, 255, 65, 0.2);
            text-shadow: 0 0 2px #00ff41;
        }

        .log-entry:last-child {
            border-bottom: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎮 GTA Battle Royale - Analytics V2</h1>
            <p>Dashboard de Análise em Tempo Real</p>
            <div style="margin-top: 10px;">
                <span>Gateway:</span>
                <span id="gatewayStatus" class="status-badge status-offline">⏸️ Desconectado</span>
                <span style="margin-left: 20px;">Backend:</span>
                <span id="backendStatus" class="status-badge status-offline">⏸️ Desconectado</span>
            </div>
        </div>

        <div class="controls">
            <div class="btn-group">
                <button id="startBtn" class="btn-start" onclick="startCapture()">▶️ INICIAR CAPTURA</button>
                <button id="stopBtn" class="btn-stop" onclick="stopCapture()" disabled>⏹️ PARAR CAPTURA</button>
                <button id="exportBtn" class="btn-export" onclick="exportToExcel()">📊 EXPORTAR PLANILHA</button>
                <button id="resetBtn" class="btn-reset" onclick="resetStats()">🔄 RESET</button>
            </div>

            <div class="stats">
                <div class="stat-card">
                    <div class="stat-label">Frames Capturados</div>
                    <div class="stat-value" id="frameCount">0</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">Eventos Detectados</div>
                    <div class="stat-value" id="eventCount">0</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">Tempo de Captura</div>
                    <div class="stat-value" id="captureTime">0s</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">FPS Médio</div>
                    <div class="stat-value" id="avgFps">0.0</div>
                </div>
            </div>
        </div>

        <div class="events-panel">
            <h2>⚔️ Eventos de Combate</h2>
            <div id="eventsContent">
                <p style="color: #a0aec0; text-align: center; padding: 40px;">
                    Aguardando detecção de eventos...
                </p>
            </div>
        </div>

        <div class="log-panel">
            <h2>📋 Log do Sistema</h2>
            <div class="log-content" id="logContent">
                Aguardando início...
            </div>
        </div>
    </div>

    <script>
        let gatewayWs = null;
        let backendWs = null;
        let capturing = false;
        let frameCount = 0;
        let eventCount = 0;
        let startTime = null;
        let captureInterval = null;
        let statsInterval = null;
        let mediaStream = null;
        let videoElement = null;

        const GATEWAY_WS = 'ws://localhost:8000/ws';
        const BACKEND_WS = 'ws://localhost:3000/events';

        function addLog(message) {
            const logContent = document.getElementById('logContent');
            const timestamp = new Date().toLocaleTimeString();
            const entry = document.createElement('div');
            entry.className = 'log-entry';
            entry.textContent = `[${timestamp}] ${message}`;
            logContent.appendChild(entry);
            logContent.scrollTop = logContent.scrollHeight;
        }

        function addEvent(eventData) {
            const eventsContent = document.getElementById('eventsContent');

            // Remove mensagem de aguardando
            if (eventsContent.querySelector('p')) {
                eventsContent.innerHTML = '';
            }

            const eventItem = document.createElement('div');
            eventItem.className = 'event-item';

            const header = document.createElement('div');
            header.className = 'event-header';
            header.textContent = `${eventData.killer} ⚔️ ${eventData.victim}`;

            const details = document.createElement('div');
            details.className = 'event-details';
            details.textContent = eventData.distance;

            const time = document.createElement('div');
            time.className = 'event-time';
            time.textContent = new Date().toLocaleTimeString();

            eventItem.appendChild(header);
            eventItem.appendChild(details);
            eventItem.appendChild(time);

            eventsContent.insertBefore(eventItem, eventsContent.firstChild);

            eventCount++;
            document.getElementById('eventCount').textContent = eventCount;
        }

        function connectBackend() {
            addLog('🔄 Conectando ao Backend Analytics...');

            backendWs = new WebSocket(BACKEND_WS);

            backendWs.onopen = () => {
                addLog('✅ Conectado ao Backend Analytics!');
                document.getElementById('backendStatus').className = 'status-badge status-online';
                document.getElementById('backendStatus').textContent = '✅ Conectado';
            };

            backendWs.onmessage = (event) => {
                try {
                    const message = JSON.parse(event.data);

                    if (message.type === 'connected') {
                        addLog(`📡 Backend: ${message.message} (${message.game_type})`);
                    }
                    else if (message.type === 'combat_event') {
                        addLog(`⚔️ Evento: ${message.data.killer} -> ${message.data.victim}`);
                        addEvent(message.data);
                    }
                    else if (message.type === 'stats_update') {
                        // Atualizar stats se necessário
                        addLog(`📊 Stats: ${message.data.kills_detected} kills detectados`);
                    }
                } catch (error) {
                    console.error('Erro ao processar mensagem do backend:', error);
                }
            };

            backendWs.onerror = (error) => {
                addLog(`❌ Erro no Backend: ${error.message || 'desconhecido'}`);
            };

            backendWs.onclose = () => {
                addLog('🔌 Desconectado do Backend');
                document.getElementById('backendStatus').className = 'status-badge status-offline';
                document.getElementById('backendStatus').textContent = '⏸️ Desconectado';

                // Tentar reconectar
                setTimeout(connectBackend, 3000);
            };
        }

        async function captureFrame() {
            try {
                if (!videoElement || !mediaStream) {
                    addLog('❌ Sem stream de vídeo ativo');
                    stopCapture();
                    return;
                }

                const canvas = document.createElement('canvas');
                canvas.width = 1920;
                canvas.height = 1080;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(videoElement, 0, 0, canvas.width, canvas.height);

                canvas.toBlob((blob) => {
                    const reader = new FileReader();
                    reader.onloadend = () => {
                        const base64 = reader.result.split(',')[1];
                        sendFrame(base64);
                    };
                    reader.readAsDataURL(blob);
                }, 'image/jpeg', 0.6);

            } catch (error) {
                addLog(`❌ Erro ao capturar frame: ${error.message}`);
                stopCapture();
            }
        }

        function sendFrame(frameData) {
            if (gatewayWs && gatewayWs.readyState === WebSocket.OPEN) {
                const message = {
                    type: 'frame',
                    data: frameData,
                    timestamp: Date.now()
                };
                gatewayWs.send(JSON.stringify(message));
                frameCount++;
                document.getElementById('frameCount').textContent = frameCount;
            }
        }

        async function startCapture() {
            if (capturing) return;

            frameCount = 0;
            eventCount = 0;
            startTime = Date.now();

            addLog('🔄 Conectando ao Gateway...');

            gatewayWs = new WebSocket(GATEWAY_WS);

            gatewayWs.onopen = async () => {
                addLog('✅ Conectado ao Gateway!');
                document.getElementById('gatewayStatus').className = 'status-badge status-online';
                document.getElementById('gatewayStatus').textContent = '✅ Conectado';

                gatewayWs.send(JSON.stringify({ type: 'start_capture' }));

                try {
                    addLog('📺 Selecione a janela para compartilhar...');

                    mediaStream = await navigator.mediaDevices.getDisplayMedia({
                        video: { mediaSource: 'screen' }
                    });

                    videoElement = document.createElement('video');
                    videoElement.srcObject = mediaStream;
                    videoElement.play();

                    mediaStream.getVideoTracks()[0].onended = () => {
                        addLog('🛑 Compartilhamento de tela encerrado');
                        stopCapture();
                    };

                    await new Promise(resolve => {
                        videoElement.onloadedmetadata = resolve;
                    });

                    addLog('✅ Compartilhamento iniciado!');
                    addLog('▶️ Captura iniciada!');
                    capturing = true;

                    document.getElementById('startBtn').disabled = true;
                    document.getElementById('stopBtn').disabled = false;

                    // Capturar a 2 FPS
                    captureInterval = setInterval(captureFrame, 500);

                    // Atualizar stats
                    statsInterval = setInterval(updateStats, 1000);

                } catch (error) {
                    addLog(`❌ Erro ao iniciar compartilhamento: ${error.message}`);
                    gatewayWs.close();
                }
            };

            gatewayWs.onerror = (error) => {
                addLog(`❌ Erro de conexão: ${error.message || 'undefined'}`);
            };

            gatewayWs.onclose = () => {
                addLog('🔌 Desconectado do Gateway');
                document.getElementById('gatewayStatus').className = 'status-badge status-offline';
                document.getElementById('gatewayStatus').textContent = '⏸️ Desconectado';
            };
        }

        function stopCapture() {
            if (!capturing) return;

            capturing = false;
            addLog('⏹️ Captura parada');
            addLog(`📊 Resumo: ${frameCount} frames capturados`);

            if (captureInterval) {
                clearInterval(captureInterval);
                captureInterval = null;
            }

            if (statsInterval) {
                clearInterval(statsInterval);
                statsInterval = null;
            }
        }

        // 📊 Exportar para Excel
        async function exportToExcel() {
            const exportBtn = document.getElementById('exportBtn');
            exportBtn.disabled = true;
            exportBtn.textContent = '⏳ Exportando...';

            try {
                addLog('📊 Exportando dados para Excel...');

                const response = await fetch(`${BACKEND_URL}/export`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    }
                });

                const result = await response.json();

                if (result.success) {
                    addLog(`✅ Planilha exportada: ${result.filename}`);
                    addLog(`📁 Localização: ${result.filepath}`);
                    alert(`✅ Planilha exportada com sucesso!\n\nArquivo: ${result.filename}\nLocalização: ${result.filepath}`);
                } else {
                    addLog(`❌ Erro ao exportar: ${result.error}`);
                    alert(`❌ Erro ao exportar: ${result.error}`);
                }

            } catch (error) {
                addLog(`❌ Erro ao exportar: ${error.message}`);
                alert(`❌ Erro ao exportar: ${error.message}`);
            } finally {
                exportBtn.disabled = false;
                exportBtn.textContent = '📊 EXPORTAR PLANILHA';
            }
        }

        // 🔄 Reset Stats
        async function resetStats() {
            if (!confirm('🔄 Resetar todas as estatísticas?\n\nIsso vai limpar todos os dados (kills, players, teams) e começar do zero.')) {
                return;
            }

            const resetBtn = document.getElementById('resetBtn');
            resetBtn.disabled = true;
            resetBtn.textContent = '⏳ Resetando...';

            try {
                addLog('🔄 Resetando estatísticas...');

                const response = await fetch(`${BACKEND_URL}/reset`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    }
                });

                const result = await response.json();

                if (result.success) {
                    addLog(`✅ Stats resetados com sucesso!`);

                    // Limpar dashboard
                    eventCount = 0;
                    document.getElementById('eventCount').textContent = '0';
                    document.getElementById('eventList').innerHTML = '<p style="color: #0af; text-align: center; padding: 20px;">Aguardando detecção de eventos...</p>';

                    alert('✅ Estatísticas resetadas com sucesso!');
                } else {
                    addLog(`❌ Erro ao resetar: ${result.error}`);
                    alert(`❌ Erro ao resetar: ${result.error}`);
                }

            } catch (error) {
                addLog(`❌ Erro ao resetar: ${error.message}`);
                alert(`❌ Erro ao resetar: ${error.message}`);
            } finally {
                resetBtn.disabled = false;
                resetBtn.textContent = '🔄 RESET';
            }

            if (mediaStream) {
                mediaStream.getTracks().forEach(track => track.stop());
                mediaStream = null;
            }

            if (videoElement) {
                videoElement = null;
            }

            if (gatewayWs) {
                gatewayWs.close();
                gatewayWs = null;
            }

            document.getElementById('startBtn').disabled = false;
            document.getElementById('stopBtn').disabled = true;
        }

        function updateStats() {
            if (!startTime) return;

            const elapsed = Math.floor((Date.now() - startTime) / 1000);
            document.getElementById('captureTime').textContent = `${elapsed}s`;

            const fps = frameCount / elapsed;
            document.getElementById('avgFps').textContent = fps.toFixed(1);
        }

        // Conectar ao backend ao carregar
        window.addEventListener('load', () => {
            connectBackend();
        });
    </script>
</body>
</html>
