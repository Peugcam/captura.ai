<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GTA Analytics - OBS Capture (Invisible)</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            /* IMPORTANTE: Fundo completamente transparente para OBS */
            background: transparent !important;
            /* OU se preferir fundo preto: */
            /* background: #000000 !important; */

            width: 100vw;
            height: 100vh;
            overflow: hidden;
        }

        /* Esconder TUDO da interface visual */
        .hidden {
            display: none !important;
        }

        /* Canvas escondido para captura */
        #canvas {
            display: none;
        }

        /* Pequeno indicador de status (opcional - pode remover) */
        #statusDot {
            position: fixed;
            top: 10px;
            right: 10px;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #ff0000;
            z-index: 9999;
            /* Remova o comentário abaixo para esconder completamente */
            /* display: none; */
        }

        #statusDot.connected {
            background: #00ff00;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
    </style>
</head>
<body>
    <!-- Apenas um pequeno indicador de status (pode remover se quiser tela 100% preta) -->
    <div id="statusDot"></div>

    <!-- Canvas escondido para processar frames -->
    <canvas id="canvas"></canvas>

    <script>
        // Configuração
        const GATEWAY_URL = 'https://gta-analytics-gateway.fly.dev';
        const CAPTURE_INTERVAL = 1000; // 1 segundo
        const MAX_RETRIES = 3;

        // Estado
        let frameCount = 0;
        let uploadCount = 0;
        let errorCount = 0;
        let isCapturing = false;
        let captureInterval = null;
        let currentStream = null;
        let retryCount = 0;

        // Elementos DOM
        const statusDot = document.getElementById('statusDot');

        // Logging (apenas no console - F12 para ver)
        function log(message, type = 'info') {
            const time = new Date().toLocaleTimeString();
            const emoji = {
                'info': 'ℹ️',
                'success': '✅',
                'error': '❌',
                'warning': '⚠️'
            };
            console.log(`[${time}] ${emoji[type] || ''} ${message}`);
        }

        // Atualizar status visual (apenas o ponto)
        function updateStatus(connected) {
            if (connected) {
                statusDot.className = 'connected';
            } else {
                statusDot.className = '';
            }
        }

        // Capturar frame via getDisplayMedia
        async function captureFrame() {
            if (isCapturing) {
                log('Captura anterior em andamento, aguardando...', 'warning');
                return;
            }

            try {
                isCapturing = true;

                // Se não tiver stream ativo, solicitar permissão
                if (!currentStream || !currentStream.active) {
                    log('Solicitando permissão de captura de tela...', 'info');

                    currentStream = await navigator.mediaDevices.getDisplayMedia({
                        video: {
                            frameRate: { ideal: 1, max: 1 }
                        },
                        audio: false
                    });

                    // Listener para detectar quando stream é parado
                    currentStream.getVideoTracks()[0].addEventListener('ended', () => {
                        log('Stream de captura foi encerrado', 'warning');
                        currentStream = null;
                        updateStatus(false);
                    });

                    log('Permissão concedida! Stream ativo.', 'success');
                    updateStatus(true);
                }

                // Criar elemento de vídeo temporário
                const video = document.createElement('video');
                video.srcObject = currentStream;
                video.muted = true;
                await video.play();

                // Aguardar frame estar pronto
                await new Promise(resolve => setTimeout(resolve, 100));

                const canvas = document.getElementById('canvas');
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;

                // Log da resolução (apenas primeira vez)
                if (frameCount === 0) {
                    log(`Resolução detectada: ${video.videoWidth}x${video.videoHeight}`, 'success');
                }

                const ctx = canvas.getContext('2d');
                ctx.drawImage(video, 0, 0);

                // Converter para blob
                const blob = await new Promise(resolve =>
                    canvas.toBlob(resolve, 'image/jpeg', 0.85)
                );

                frameCount++;

                // Log a cada 10 frames para não poluir console
                if (frameCount % 10 === 0) {
                    log(`${frameCount} frames capturados`, 'info');
                }

                // Enviar para gateway
                await uploadFrame(blob);

                // Reset retry count on success
                retryCount = 0;

            } catch (error) {
                if (error.name === 'NotAllowedError') {
                    log('❌ PERMISSÃO NEGADA! Você precisa permitir a captura de tela.', 'error');
                    log('No OBS: Clique direito na fonte → Interact → Permitir captura', 'error');
                    errorCount++;
                    updateStatus(false);

                    // Parar tentativas após erro de permissão
                    if (captureInterval) {
                        clearInterval(captureInterval);
                        captureInterval = null;
                    }

                } else if (error.name === 'NotReadableError') {
                    log('Stream não está pronto, tentando novamente...', 'warning');
                    currentStream = null;

                } else {
                    log(`Erro ao capturar: ${error.message}`, 'error');
                    errorCount++;

                    // Tentar recriar stream se houver muitos erros
                    retryCount++;
                    if (retryCount >= MAX_RETRIES) {
                        log('Muitos erros, recriando stream...', 'warning');
                        currentStream = null;
                        retryCount = 0;
                    }
                }
            } finally {
                isCapturing = false;
            }
        }

        // Upload frame para gateway
        async function uploadFrame(blob) {
            try {
                const formData = new FormData();
                formData.append('file', blob, 'frame.jpg');

                const response = await fetch(`${GATEWAY_URL}/upload`, {
                    method: 'POST',
                    body: formData
                });

                if (response.ok) {
                    uploadCount++;

                    // Log a cada 10 uploads
                    if (uploadCount % 10 === 0) {
                        log(`${uploadCount} frames enviados com sucesso`, 'success');
                    }

                    updateStatus(true);
                } else {
                    const errorText = await response.text();
                    throw new Error(`HTTP ${response.status}: ${errorText}`);
                }

            } catch (error) {
                errorCount++;
                updateStatus(false);
                log(`Erro ao enviar frame: ${error.message}`, 'error');
            }
        }

        // Iniciar captura automática
        async function startCapture() {
            log('🚀 GTA Analytics - OBS Capture (Versão Invisível)', 'info');
            log(`Gateway: ${GATEWAY_URL}`, 'info');

            // Testar conexão com gateway
            try {
                const response = await fetch(`${GATEWAY_URL}/health`, {
                    method: 'GET',
                    cache: 'no-cache'
                });

                if (response.ok) {
                    log('✅ Gateway online e acessível', 'success');
                } else {
                    throw new Error(`Gateway retornou HTTP ${response.status}`);
                }
            } catch (error) {
                log(`⚠️ Aviso: Gateway não acessível: ${error.message}`, 'warning');
                log('Verificando se é problema de CORS ou rede...', 'warning');
            }

            // Aguardar 2 segundos antes de solicitar permissão
            await new Promise(resolve => setTimeout(resolve, 2000));

            log('📸 Solicitando permissão de captura...', 'info');
            log('IMPORTANTE: Selecione "Janela: Grand Theft Auto V" para melhor performance!', 'info');

            // Primeira captura para obter permissão
            await captureFrame();

            // Iniciar intervalo de captura
            if (captureInterval) {
                clearInterval(captureInterval);
            }

            captureInterval = setInterval(captureFrame, CAPTURE_INTERVAL);
            log(`⏱️ Captura automática iniciada (${CAPTURE_INTERVAL}ms entre frames)`, 'success');
            log('✅ Sistema funcionando! Abra o Console (F12) para ver logs.', 'success');
        }

        // Relatório de status a cada 30 segundos
        setInterval(() => {
            if (frameCount > 0 || uploadCount > 0 || errorCount > 0) {
                log(`📊 Status: ${frameCount} capturas | ${uploadCount} uploads | ${errorCount} erros`, 'info');
            }
        }, 30000);

        // Inicializar quando página carregar
        window.addEventListener('load', () => {
            log('📺 OBS Browser Source detectado', 'info');
            log('Aguarde 2 segundos...', 'info');

            // Iniciar captura
            startCapture();
        });

        // Cleanup ao fechar
        window.addEventListener('beforeunload', () => {
            if (captureInterval) {
                clearInterval(captureInterval);
            }
            if (currentStream) {
                currentStream.getTracks().forEach(track => track.stop());
            }
            log('👋 Encerrando captura...', 'info');
        });

        // Expor funções globais para debug (acessível via console)
        window.gtaAnalytics = {
            getStats: () => ({
                frames: frameCount,
                uploads: uploadCount,
                errors: errorCount,
                streaming: currentStream?.active || false
            }),
            restart: () => {
                if (currentStream) {
                    currentStream.getTracks().forEach(track => track.stop());
                    currentStream = null;
                }
                frameCount = 0;
                uploadCount = 0;
                errorCount = 0;
                startCapture();
            }
        };

        log('💡 Use window.gtaAnalytics.getStats() no console para ver estatísticas', 'info');
        log('💡 Use window.gtaAnalytics.restart() para reiniciar captura', 'info');
    </script>
</body>
</html>
