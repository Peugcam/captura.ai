[pytest]
# Pytest configuration for GTA Analytics V2

# Test discovery
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Test paths
testpaths = tests

# Markers
markers =
    unit: Unit tests (fast, isolated)
    integration: Integration tests (require services)
    e2e: End-to-end tests (full system)
    slow: Slow tests (> 1 second)
    real_api: Tests that use real API (consume credits)

# Coverage options
addopts =
    -v
    --strict-markers
    --tb=short
    --disable-warnings
    --color=yes

# Asyncio mode
asyncio_mode = auto

# Logging
log_cli = false
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

# Timeout (prevent hanging tests)
timeout = 30
timeout_method = thread
