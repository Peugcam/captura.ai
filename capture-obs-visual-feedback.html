<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GTA Analytics - OBS Monitor</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #1a1a1a 0%, #2d2d2d 100%);
            color: #00ff00;
            font-family: 'Consolas', 'Monaco', 'Courier New', monospace;
            padding: 40px;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .monitor {
            background: rgba(0, 0, 0, 0.8);
            border: 3px solid #00ff00;
            border-radius: 15px;
            padding: 40px;
            box-shadow: 0 0 30px rgba(0, 255, 0, 0.5);
            max-width: 600px;
            width: 100%;
        }

        h1 {
            text-align: center;
            font-size: 32px;
            margin-bottom: 30px;
            text-shadow: 0 0 20px rgba(0, 255, 0, 0.8);
        }

        .status {
            text-align: center;
            margin: 30px 0;
            padding: 20px;
            background: rgba(0, 255, 0, 0.1);
            border-radius: 10px;
            border: 2px solid #00ff00;
        }

        .status-icon {
            font-size: 48px;
            margin-bottom: 15px;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.1); opacity: 0.7; }
        }

        .status-text {
            font-size: 24px;
            font-weight: bold;
            text-shadow: 0 0 10px rgba(0, 255, 0, 0.6);
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            margin: 30px 0;
        }

        .stat {
            background: rgba(0, 0, 0, 0.6);
            border: 2px solid #00ff00;
            border-radius: 10px;
            padding: 20px;
            text-align: center;
            transition: all 0.3s ease;
        }

        .stat:hover {
            background: rgba(0, 255, 0, 0.1);
            box-shadow: 0 0 20px rgba(0, 255, 0, 0.4);
        }

        .stat-label {
            font-size: 14px;
            opacity: 0.8;
            margin-bottom: 10px;
        }

        .stat-value {
            font-size: 36px;
            font-weight: bold;
            color: #00ff00;
            text-shadow: 0 0 15px rgba(0, 255, 0, 0.8);
        }

        .stat-value.large {
            font-size: 28px;
        }

        .info {
            text-align: center;
            margin-top: 20px;
            padding: 15px;
            background: rgba(0, 100, 255, 0.2);
            border: 2px solid #00ccff;
            border-radius: 8px;
            color: #00ccff;
            font-size: 14px;
        }

        .error {
            background: rgba(255, 0, 0, 0.2);
            border-color: #ff0000;
            color: #ff0000;
        }

        .warning {
            background: rgba(255, 255, 0, 0.2);
            border-color: #ffff00;
            color: #ffff00;
        }

        .success {
            background: rgba(0, 255, 0, 0.2);
            border-color: #00ff00;
            color: #00ff00;
        }

        .timestamp {
            text-align: center;
            font-size: 12px;
            opacity: 0.6;
            margin-top: 20px;
        }

        .preview-note {
            text-align: center;
            margin-top: 30px;
            padding: 20px;
            background: rgba(255, 255, 0, 0.1);
            border: 2px dashed #ffff00;
            border-radius: 10px;
            color: #ffff00;
        }

        .preview-note strong {
            font-size: 18px;
            display: block;
            margin-bottom: 10px;
        }

        canvas {
            display: none;
        }
    </style>
</head>
<body>
    <div class="monitor">
        <h1>🎮 GTA ANALYTICS</h1>

        <div class="status" id="statusBox">
            <div class="status-icon" id="statusIcon">⏳</div>
            <div class="status-text" id="statusText">Iniciando...</div>
        </div>

        <div class="stats-grid">
            <div class="stat">
                <div class="stat-label">📸 Frames Capturados</div>
                <div class="stat-value" id="frameCount">0</div>
            </div>
            <div class="stat">
                <div class="stat-label">☁️ Enviados</div>
                <div class="stat-value" id="uploadCount">0</div>
            </div>
            <div class="stat">
                <div class="stat-label">❌ Erros</div>
                <div class="stat-value" id="errorCount">0</div>
            </div>
            <div class="stat">
                <div class="stat-label">⏱️ Último Envio</div>
                <div class="stat-value large" id="lastUpload">--:--</div>
            </div>
        </div>

        <div class="info success" id="infoBox" style="display: none;">
            ✅ Sistema operacional
        </div>

        <div class="preview-note">
            <strong>📺 IMPORTANTE:</strong>
            Esta janela aparece APENAS no OBS para você monitorar.<br>
            O jogador NÃO VÊ isso na tela do jogo!<br>
            Pode minimizar o OBS e jogar normalmente.
        </div>

        <div class="timestamp" id="timestamp">--</div>
    </div>

    <canvas id="canvas"></canvas>

    <script>
        // Configuração
        const GATEWAY_URL = 'https://gta-analytics-gateway.fly.dev';
        const CAPTURE_INTERVAL = 1000; // 1 segundo

        // Estado
        let frameCount = 0;
        let uploadCount = 0;
        let errorCount = 0;
        let isCapturing = false;
        let captureInterval = null;
        let currentStream = null;

        // Elementos DOM
        const statusBox = document.getElementById('statusBox');
        const statusIcon = document.getElementById('statusIcon');
        const statusText = document.getElementById('statusText');
        const frameCountEl = document.getElementById('frameCount');
        const uploadCountEl = document.getElementById('uploadCount');
        const errorCountEl = document.getElementById('errorCount');
        const lastUploadEl = document.getElementById('lastUpload');
        const infoBox = document.getElementById('infoBox');
        const timestamp = document.getElementById('timestamp');

        // Atualizar timestamp
        setInterval(() => {
            const now = new Date();
            timestamp.textContent = now.toLocaleString('pt-BR');
        }, 1000);

        // Logging (console)
        function log(message, type = 'info') {
            const time = new Date().toLocaleTimeString();
            console.log(`[${time}] [${type.toUpperCase()}] ${message}`);
        }

        // Atualizar status visual
        function updateStatus(status, message, info = null) {
            const statusConfigs = {
                'waiting': { icon: '⏳', class: '' },
                'requesting': { icon: '🔐', class: 'warning' },
                'connected': { icon: '✅', class: 'success' },
                'capturing': { icon: '📸', class: 'success' },
                'uploading': { icon: '☁️', class: 'success' },
                'error': { icon: '❌', class: 'error' },
                'denied': { icon: '🚫', class: 'error' }
            };

            const config = statusConfigs[status] || statusConfigs['waiting'];
            statusIcon.textContent = config.icon;
            statusText.textContent = message;

            statusBox.className = 'status ' + config.class;

            if (info) {
                infoBox.textContent = info;
                infoBox.style.display = 'block';
                infoBox.className = 'info ' + config.class;
            }
        }

        // Capturar frame
        async function captureFrame() {
            if (isCapturing) {
                return;
            }

            try {
                isCapturing = true;

                // Se não tiver stream, solicitar permissão
                if (!currentStream || !currentStream.active) {
                    log('Solicitando permissão de captura...', 'info');
                    updateStatus('requesting', 'Solicitando permissão...',
                        '🔐 Selecione "Janela: Grand Theft Auto V" quando aparecer a janela');

                    currentStream = await navigator.mediaDevices.getDisplayMedia({
                        video: { frameRate: { ideal: 1, max: 1 } },
                        audio: false
                    });

                    // Listener para stream encerrado
                    currentStream.getVideoTracks()[0].addEventListener('ended', () => {
                        log('Stream encerrado pelo usuário', 'warning');
                        currentStream = null;
                        updateStatus('error', 'Stream encerrado',
                            '⚠️ Recarregue a página (F5) para reiniciar');
                    });

                    log('Permissão concedida!', 'success');
                    updateStatus('connected', '🟢 CONECTADO E CAPTURANDO',
                        '✅ Sistema funcionando! Pode minimizar o OBS e jogar.');
                }

                updateStatus('capturing', '📸 Capturando...', null);

                // Criar vídeo temporário
                const video = document.createElement('video');
                video.srcObject = currentStream;
                video.muted = true;
                await video.play();
                await new Promise(resolve => setTimeout(resolve, 100));

                const canvas = document.getElementById('canvas');
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;

                // Log resolução (primeira vez)
                if (frameCount === 0) {
                    log(`Resolução: ${video.videoWidth}x${video.videoHeight}`, 'success');
                    updateStatus('connected', '🟢 CONECTADO E CAPTURANDO',
                        `✅ Resolução: ${video.videoWidth}x${video.videoHeight}`);
                }

                const ctx = canvas.getContext('2d');
                ctx.drawImage(video, 0, 0);

                // Converter para blob
                const blob = await new Promise(resolve =>
                    canvas.toBlob(resolve, 'image/jpeg', 0.85)
                );

                frameCount++;
                frameCountEl.textContent = frameCount;

                // Enviar
                await uploadFrame(blob);

            } catch (error) {
                if (error.name === 'NotAllowedError') {
                    log('Permissão NEGADA pelo usuário', 'error');
                    errorCount++;
                    errorCountEl.textContent = errorCount;
                    updateStatus('denied', '🚫 PERMISSÃO NEGADA',
                        '❌ Você precisa PERMITIR a captura! Clique direito → Interact → F5 para tentar novamente.');

                    // Parar tentativas
                    if (captureInterval) {
                        clearInterval(captureInterval);
                        captureInterval = null;
                    }
                } else {
                    log(`Erro: ${error.message}`, 'error');
                    errorCount++;
                    errorCountEl.textContent = errorCount;
                }
            } finally {
                isCapturing = false;
            }
        }

        // Upload frame
        async function uploadFrame(blob) {
            try {
                updateStatus('uploading', '☁️ Enviando para nuvem...', null);

                const formData = new FormData();
                formData.append('file', blob, 'frame.jpg');

                const response = await fetch(`${GATEWAY_URL}/upload`, {
                    method: 'POST',
                    body: formData
                });

                if (response.ok) {
                    uploadCount++;
                    uploadCountEl.textContent = uploadCount;

                    const now = new Date().toLocaleTimeString('pt-BR');
                    lastUploadEl.textContent = now;

                    updateStatus('connected', '🟢 CONECTADO E CAPTURANDO',
                        `✅ ${uploadCount} frames enviados com sucesso`);

                    log(`Frame #${frameCount} enviado`, 'success');
                } else {
                    throw new Error(`HTTP ${response.status}`);
                }

            } catch (error) {
                errorCount++;
                errorCountEl.textContent = errorCount;
                updateStatus('error', '❌ Erro no upload',
                    `⚠️ ${error.message} - Verifique conexão`);
                log(`Erro upload: ${error.message}`, 'error');
            }
        }

        // Iniciar
        async function start() {
            log('GTA Analytics - OBS Monitor iniciado', 'info');
            updateStatus('waiting', 'Aguardando 2 segundos...',
                'ℹ️ Sistema vai solicitar permissão em breve');

            // Testar gateway
            try {
                const response = await fetch(`${GATEWAY_URL}/health`);
                if (response.ok) {
                    log('Gateway online', 'success');
                } else {
                    throw new Error('Gateway offline');
                }
            } catch (error) {
                log(`Gateway não acessível: ${error.message}`, 'warning');
                updateStatus('error', '⚠️ Gateway offline',
                    '❌ Servidor não acessível. Verifique se está rodando.');
            }

            // Aguardar e solicitar permissão
            await new Promise(resolve => setTimeout(resolve, 2000));
            await captureFrame();

            // Iniciar intervalo
            if (captureInterval) clearInterval(captureInterval);
            captureInterval = setInterval(captureFrame, CAPTURE_INTERVAL);

            log('Captura automática iniciada', 'success');
        }

        // Inicializar
        window.addEventListener('load', start);

        // Cleanup
        window.addEventListener('beforeunload', () => {
            if (captureInterval) clearInterval(captureInterval);
            if (currentStream) {
                currentStream.getTracks().forEach(track => track.stop());
            }
        });
    </script>
</body>
</html>
