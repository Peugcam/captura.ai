<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GTA Battle Royale - Analytics Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', 'Segoe UI', sans-serif;
            background: #0e1015;
            color: #ffffff;
            overflow: hidden;
            height: 100vh;
        }

        /* LAYOUT PRINCIPAL - ESTILO OBS */
        .obs-layout {
            display: grid;
            grid-template-columns: 300px 1fr 320px;
            grid-template-rows: 1fr 80px;
            gap: 10px;
            height: 100vh;
            padding: 10px;
        }

        /* PAINEL ESQUERDO - KILL FEED */
        .left-panel {
            background: linear-gradient(145deg, #1a1d24 0%, #151820 100%);
            border-radius: 12px;
            border: 1px solid #2a2d35;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* CENTRO - PREVIEW DA CAPTURA */
        .center-preview {
            background: #000000;
            border-radius: 12px;
            border: 2px solid #2a2d35;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        .center-preview video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: contain;
            background: #000;
            display: none;
            z-index: 10;
        }

        .preview-placeholder {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            color: #6b7280;
            z-index: 5;
        }

        .preview-placeholder svg {
            width: 120px;
            height: 120px;
            opacity: 0.3;
            margin-bottom: 20px;
        }

        /* PAINEL DIREITO - RANKING */
        .right-panel {
            background: linear-gradient(145deg, #1a1d24 0%, #151820 100%);
            border-radius: 12px;
            border: 1px solid #2a2d35;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* RODAPÉ - CONTROLES */
        .footer-controls {
            grid-column: 1 / -1;
            background: linear-gradient(145deg, #1a1d24 0%, #151820 100%);
            border-radius: 12px;
            border: 1px solid #2a2d35;
            padding: 15px 20px;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        /* HEADERS DE SEÇÃO */
        .section-header {
            background: linear-gradient(90deg, #ef4444 0%, #dc2626 100%);
            padding: 12px 16px;
            font-weight: 600;
            font-size: 13px;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            border-bottom: 2px solid #991b1b;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .section-header.blue {
            background: linear-gradient(90deg, #3b82f6 0%, #2563eb 100%);
            border-bottom-color: #1e40af;
        }

        .section-header.purple {
            background: linear-gradient(90deg, #8b5cf6 0%, #7c3aed 100%);
            border-bottom-color: #5b21b6;
        }

        /* CONTEÚDO SCROLLABLE */
        .scrollable-content {
            flex: 1;
            overflow-y: auto;
            padding: 12px;
        }

        .scrollable-content::-webkit-scrollbar {
            width: 6px;
        }

        .scrollable-content::-webkit-scrollbar-track {
            background: #1a1d24;
        }

        .scrollable-content::-webkit-scrollbar-thumb {
            background: #3b4251;
            border-radius: 3px;
        }

        /* KILL FEED ITEM */
        .kill-item {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid #2a2d35;
            border-radius: 8px;
            padding: 10px;
            margin-bottom: 8px;
            font-size: 13px;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(-20px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .kill-item-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 6px;
        }

        .kill-time {
            color: #6b7280;
            font-size: 11px;
        }

        .kill-type-badge {
            background: #374151;
            color: #9ca3af;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 10px;
            font-weight: 600;
            text-transform: uppercase;
        }

        .kill-type-badge.weapon { background: #fbbf24; color: #78350f; }
        .kill-type-badge.explosion { background: #ef4444; color: #7f1d1d; }
        .kill-type-badge.fall { background: #3b82f6; color: #1e3a8a; }

        .kill-players {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .player {
            flex: 1;
            padding: 6px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 4px;
        }

        .player-name {
            font-weight: 600;
            font-size: 13px;
        }

        .player-team {
            font-size: 11px;
            color: #9ca3af;
        }

        .kill-icon {
            color: #ef4444;
            font-size: 16px;
        }

        /* RANKING ITEM */
        .rank-item {
            display: flex;
            align-items: center;
            gap: 12px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid #2a2d35;
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 8px;
        }

        .rank-position {
            font-size: 18px;
            font-weight: 700;
            color: #6b7280;
            min-width: 30px;
        }

        .rank-item:nth-child(1) .rank-position { color: #fbbf24; }
        .rank-item:nth-child(2) .rank-position { color: #9ca3af; }
        .rank-item:nth-child(3) .rank-position { color: #cd7f32; }

        .rank-info {
            flex: 1;
        }

        .rank-player-name {
            font-weight: 600;
            font-size: 14px;
            margin-bottom: 2px;
        }

        .rank-player-team {
            font-size: 11px;
            color: #6b7280;
        }

        .rank-stats {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .rank-stat {
            text-align: center;
        }

        .rank-stat-value {
            font-size: 18px;
            font-weight: 700;
            color: #10b981;
        }

        .rank-stat-label {
            font-size: 10px;
            color: #6b7280;
            text-transform: uppercase;
        }

        .status-indicator {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #10b981;
        }

        .status-indicator.dead {
            background: #6b7280;
        }

        /* TEAM CARD */
        .team-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid #2a2d35;
            border-left: 4px solid #3b82f6;
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 8px;
        }

        .team-card.eliminated {
            border-left-color: #6b7280;
            opacity: 0.5;
        }

        .team-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }

        .team-name {
            font-weight: 700;
            font-size: 16px;
        }

        .team-alive {
            background: #10b981;
            color: #ffffff;
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 700;
        }

        .team-card.eliminated .team-alive {
            background: #6b7280;
        }

        .team-stats {
            display: flex;
            gap: 15px;
            font-size: 12px;
            color: #9ca3af;
        }

        /* CONTROLES */
        .control-group {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn-start {
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            color: white;
        }

        .btn-start:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(16, 185, 129, 0.4);
        }

        .btn-stop {
            background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%);
            color: white;
        }

        .btn-stop:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(239, 68, 68, 0.4);
        }

        .btn-reset {
            background: #374151;
            color: white;
        }

        .btn-reset:hover:not(:disabled) {
            background: #4b5563;
        }

        .stat-display {
            display: flex;
            align-items: center;
            gap: 6px;
            background: rgba(255, 255, 255, 0.05);
            padding: 8px 14px;
            border-radius: 6px;
            font-size: 13px;
        }

        .stat-label {
            color: #9ca3af;
        }

        .stat-value {
            font-weight: 700;
            color: #10b981;
        }

        .status-badge {
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .status-badge.connected {
            background: rgba(16, 185, 129, 0.2);
            color: #10b981;
        }

        .status-badge.disconnected {
            background: rgba(107, 114, 128, 0.2);
            color: #6b7280;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: currentColor;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        /* EMPTY STATE */
        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: #6b7280;
        }

        .empty-state svg {
            width: 64px;
            height: 64px;
            opacity: 0.3;
            margin-bottom: 12px;
        }
    </style>
</head>
<body>
    <div class="obs-layout">
        <!-- PAINEL ESQUERDO - KILL FEED -->
        <div class="left-panel">
            <div class="section-header">
                <span>⚔️</span>
                <span>Kill Feed em Tempo Real</span>
            </div>
            <div class="scrollable-content" id="killFeedContent">
                <div class="empty-state">
                    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/>
                    </svg>
                    <div>Aguardando eventos de combate...</div>
                </div>
            </div>

            <!-- ESTATÍSTICAS DE COMBATE -->
            <div class="section-header blue" style="border-top: 1px solid #2a2d35;">
                <span>📊</span>
                <span>Times Ativos</span>
            </div>
            <div class="scrollable-content" id="teamsContent" style="max-height: 200px;">
                <div class="empty-state">
                    <div>Aguardando dados...</div>
                </div>
            </div>
        </div>

        <!-- CENTRO - PREVIEW DA CAPTURA -->
        <div class="center-preview">
            <video id="previewVideo" autoplay muted playsinline></video>
            <div class="preview-placeholder" id="previewPlaceholder">
                <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 10l4.553-2.276A1 1 0 0121 8.618v6.764a1 1 0 01-1.447.894L15 14M5 18h8a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v8a2 2 0 002 2z"/>
                </svg>
                <h3>Preview da Captura</h3>
                <p>Inicie a captura para visualizar</p>
            </div>
        </div>

        <!-- PAINEL DIREITO - RANKING -->
        <div class="right-panel">
            <div class="section-header purple">
                <span>🏆</span>
                <span>Top Jogadores</span>
            </div>
            <div class="scrollable-content" id="rankingContent">
                <div class="empty-state">
                    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
                    </svg>
                    <div>Aguardando kills...</div>
                </div>
            </div>
        </div>

        <!-- RODAPÉ - CONTROLES -->
        <div class="footer-controls">
            <div class="status-badge connected" id="backendStatus">
                <span class="status-dot"></span>
                Backend
            </div>
            <div class="status-badge disconnected" id="gatewayStatus">
                <span class="status-dot"></span>
                Gateway
            </div>

            <div style="flex: 1;"></div>

            <div class="control-group">
                <div class="stat-display">
                    <span class="stat-label">Frames:</span>
                    <span class="stat-value" id="frameCount">0</span>
                </div>
                <div class="stat-display">
                    <span class="stat-label">Kills:</span>
                    <span class="stat-value" id="killCount">0</span>
                </div>
                <div class="stat-display">
                    <span class="stat-label">Tempo:</span>
                    <span class="stat-value" id="captureTime">0s</span>
                </div>
            </div>

            <div style="flex: 1;"></div>

            <div class="control-group">
                <button class="btn btn-start" id="btnStart" onclick="startCapture()">
                    <span>▶️</span>
                    <span>Iniciar</span>
                </button>
                <button class="btn btn-stop" id="btnStop" onclick="stopCapture()" disabled>
                    <span>⏹️</span>
                    <span>Parar</span>
                </button>
                <button class="btn btn-reset" id="btnReset" onclick="resetDashboard()">
                    <span>🔄</span>
                    <span>Reset</span>
                </button>
            </div>
        </div>
    </div>

    <script>
        let ws = null;
        let analyticsWs = null;
        let capturing = false;
        let frameCount = 0;
        let killCount = 0;
        let startTime = null;
        let captureInterval = null;
        let statsInterval = null;
        let mediaStream = null;
        let videoElement = null;

        const GATEWAY_WS = 'ws://localhost:8000/ws';
        const ANALYTICS_WS = 'ws://localhost:3000/events';

        // Conectar ao Backend Analytics automaticamente
        function connectAnalyticsWebSocket() {
            try {
                analyticsWs = new WebSocket(ANALYTICS_WS);

                analyticsWs.onopen = () => {
                    document.getElementById('backendStatus').className = 'status-badge connected';
                    console.log('Connected to Backend Analytics');
                };

                analyticsWs.onmessage = (event) => {
                    const message = JSON.parse(event.data);

                    if (message.type === 'kill') {
                        addKillToFeed(message.data);
                        killCount++;
                        document.getElementById('killCount').textContent = killCount;
                    }

                    if (message.type === 'stats') {
                        console.log('📊 Stats recebidas:', message.data);
                        updateStats(message.data);
                    }
                };

                analyticsWs.onerror = () => {
                    document.getElementById('backendStatus').className = 'status-badge disconnected';
                };

                analyticsWs.onclose = () => {
                    document.getElementById('backendStatus').className = 'status-badge disconnected';
                    setTimeout(connectAnalyticsWebSocket, 3000);
                };

            } catch (error) {
                console.error('Analytics WebSocket error:', error);
            }
        }

        function addKillToFeed(kill) {
            const killFeed = document.getElementById('killFeedContent');

            // Remover empty state
            if (killFeed.querySelector('.empty-state')) {
                killFeed.innerHTML = '';
            }

            const killItem = document.createElement('div');
            killItem.className = 'kill-item';

            const now = new Date();
            const time = now.toLocaleTimeString();
            const killType = kill.kill_type || 'unknown';

            killItem.innerHTML = `
                <div class="kill-item-header">
                    <span class="kill-time">${time}</span>
                    <span class="kill-type-badge ${killType}">${killType}</span>
                </div>
                <div class="kill-players">
                    <div class="player">
                        <div class="player-name">${kill.killer}</div>
                        <div class="player-team">${kill.killer_team}</div>
                    </div>
                    <span class="kill-icon">💀</span>
                    <div class="player">
                        <div class="player-name">${kill.victim}</div>
                        <div class="player-team">${kill.victim_team}</div>
                    </div>
                </div>
                ${kill.distance ? `<div style="text-align: center; margin-top: 6px; font-size: 11px; color: #9ca3af;">${kill.distance}</div>` : ''}
            `;

            killFeed.insertBefore(killItem, killFeed.firstChild);

            // Manter apenas últimos 20 itens
            while (killFeed.children.length > 20) {
                killFeed.removeChild(killFeed.lastChild);
            }
        }

        function updateStats(stats) {
            // Atualizar Times
            const teamsContent = document.getElementById('teamsContent');
            if (stats.teams && stats.teams.length > 0) {
                teamsContent.innerHTML = '';
                stats.teams.forEach(team => {
                    const teamCard = document.createElement('div');
                    teamCard.className = `team-card ${team.alive === 0 ? 'eliminated' : ''}`;
                    teamCard.innerHTML = `
                        <div class="team-header">
                            <div class="team-name">${team.name}</div>
                            <div class="team-alive">${team.alive} vivos</div>
                        </div>
                        <div class="team-stats">
                            <span>Total: ${team.total}</span>
                            <span>Kills: ${team.kills}</span>
                        </div>
                    `;
                    teamsContent.appendChild(teamCard);
                });
            }

            // Atualizar Ranking
            const rankingContent = document.getElementById('rankingContent');
            if (stats.leaderboard && stats.leaderboard.length > 0) {
                rankingContent.innerHTML = '';
                stats.leaderboard.slice(0, 10).forEach((player, idx) => {
                    const rankItem = document.createElement('div');
                    rankItem.className = 'rank-item';
                    rankItem.innerHTML = `
                        <div class="rank-position">#${idx + 1}</div>
                        <div class="status-indicator ${player.alive ? '' : 'dead'}"></div>
                        <div class="rank-info">
                            <div class="rank-player-name">${player.name}</div>
                            <div class="rank-player-team">${player.team}</div>
                        </div>
                        <div class="rank-stats">
                            <div class="rank-stat">
                                <div class="rank-stat-value">${player.kills}</div>
                                <div class="rank-stat-label">Kills</div>
                            </div>
                            <div class="rank-stat">
                                <div class="rank-stat-value" style="color: #ef4444;">${player.deaths}</div>
                                <div class="rank-stat-label">Deaths</div>
                            </div>
                        </div>
                    `;
                    rankingContent.appendChild(rankItem);
                });
            }
        }

        async function startCapture() {
            if (capturing) return;

            frameCount = 0;
            killCount = 0;
            startTime = Date.now();

            ws = new WebSocket(GATEWAY_WS);

            ws.onopen = async () => {
                document.getElementById('gatewayStatus').className = 'status-badge connected';
                ws.send(JSON.stringify({ type: 'start_capture' }));

                try {
                    mediaStream = await navigator.mediaDevices.getDisplayMedia({
                        video: { mediaSource: 'screen' }
                    });

                    videoElement = document.getElementById('previewVideo');
                    videoElement.srcObject = mediaStream;

                    // Aguardar stream carregar antes de mostrar
                    videoElement.onloadedmetadata = () => {
                        videoElement.play();
                        videoElement.style.display = 'block';
                        document.getElementById('previewPlaceholder').style.display = 'none';
                        console.log('✅ Vídeo carregado e exibido!');
                    };

                    mediaStream.getVideoTracks()[0].onended = () => {
                        stopCapture();
                    };

                    capturing = true;
                    document.getElementById('btnStart').disabled = true;
                    document.getElementById('btnStop').disabled = false;

                    const fps = 2;
                    const interval = 1000 / fps;

                    captureInterval = setInterval(() => {
                        captureFrame();
                    }, interval);

                    statsInterval = setInterval(() => {
                        const elapsed = (Date.now() - startTime) / 1000;
                        document.getElementById('captureTime').textContent = elapsed.toFixed(0) + 's';
                    }, 1000);

                } catch (error) {
                    console.error('Screen share error:', error);
                    stopCapture();
                }
            };

            ws.onerror = () => {
                document.getElementById('gatewayStatus').className = 'status-badge disconnected';
            };

            ws.onclose = () => {
                document.getElementById('gatewayStatus').className = 'status-badge disconnected';
            };
        }

        function captureFrame() {
            try {
                if (!videoElement || !mediaStream) return;

                const canvas = document.createElement('canvas');
                canvas.width = 1920;
                canvas.height = 1080;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(videoElement, 0, 0, canvas.width, canvas.height);

                canvas.toBlob((blob) => {
                    const reader = new FileReader();
                    reader.onloadend = () => {
                        const base64 = reader.result.split(',')[1];
                        sendFrame(base64);
                    };
                    reader.readAsDataURL(blob);
                }, 'image/jpeg', 0.6);

            } catch (error) {
                console.error('Frame capture error:', error);
            }
        }

        function sendFrame(frameData) {
            if (ws && ws.readyState === WebSocket.OPEN) {
                const message = {
                    type: 'frame',
                    data: frameData,
                    timestamp: Date.now()
                };
                ws.send(JSON.stringify(message));
                frameCount++;
                document.getElementById('frameCount').textContent = frameCount;
            }
        }

        function stopCapture() {
            if (!capturing) return;

            clearInterval(captureInterval);
            clearInterval(statsInterval);

            if (mediaStream) {
                mediaStream.getTracks().forEach(track => track.stop());
                mediaStream = null;
                videoElement.style.display = 'none';
                document.getElementById('previewPlaceholder').style.display = 'block';
            }

            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({ type: 'stop_capture' }));
                ws.close();
            }

            capturing = false;
            document.getElementById('btnStart').disabled = false;
            document.getElementById('btnStop').disabled = true;
        }

        function resetDashboard() {
            document.getElementById('killFeedContent').innerHTML = '<div class="empty-state"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/></svg><div>Aguardando eventos de combate...</div></div>';
            document.getElementById('teamsContent').innerHTML = '<div class="empty-state"><div>Aguardando dados...</div></div>';
            document.getElementById('rankingContent').innerHTML = '<div class="empty-state"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg><div>Aguardando kills...</div></div>';
            frameCount = 0;
            killCount = 0;
            document.getElementById('frameCount').textContent = '0';
            document.getElementById('killCount').textContent = '0';
            document.getElementById('captureTime').textContent = '0s';
        }

        // Conectar automaticamente ao carregar
        window.addEventListener('DOMContentLoaded', () => {
