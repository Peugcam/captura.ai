<!DOCTYPE html>
<html>
<head>
    <title>Teste Dashboard - GTA Analytics</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
            background: #1a1a2e;
            color: white;
        }
        .test-section {
            margin: 20px 0;
            padding: 15px;
            background: rgba(255,255,255,0.1);
            border-radius: 8px;
        }
        .status {
            padding: 10px;
            margin: 10px 0;
            border-radius: 5px;
        }
        .success { background: rgba(46, 204, 113, 0.3); }
        .error { background: rgba(231, 76, 60, 0.3); }
        .info { background: rgba(52, 152, 219, 0.3); }
        button {
            padding: 10px 20px;
            margin: 5px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            background: #667eea;
            color: white;
            font-weight: bold;
        }
        button:hover {
            background: #764ba2;
        }
        #log {
            background: #0a0a0a;
            padding: 15px;
            border-radius: 5px;
            font-family: monospace;
            font-size: 12px;
            max-height: 400px;
            overflow-y: auto;
            margin-top: 20px;
        }
        .log-entry {
            margin: 5px 0;
            padding: 5px;
        }
    </style>
</head>
<body>
    <h1>🧪 Teste de Dashboard - GTA Tournament Tracker</h1>

    <div class="test-section">
        <h2>1. Teste de Conexão Backend</h2>
        <button onclick="testBackendConnection()">Testar Conexão HTTP</button>
        <button onclick="testWebSocket()">Testar WebSocket</button>
        <div id="connectionStatus" class="status info">Aguardando teste...</div>
    </div>

    <div class="test-section">
        <h2>2. Teste de Roster Manual</h2>
        <button onclick="loadTestRoster()">Carregar Roster de Teste (3 times)</button>
        <div id="rosterStatus" class="status info">Aguardando teste...</div>
    </div>

    <div class="test-section">
        <h2>3. Teste de Toggle de Player</h2>
        <button onclick="testPlayerToggle()">Toggle Player Status</button>
        <div id="toggleStatus" class="status info">Aguardando teste...</div>
    </div>

    <div class="test-section">
        <h2>4. Teste de Reset</h2>
        <button onclick="testMatchReset()">Reset Match</button>
        <button onclick="testClearRoster()">Clear Roster</button>
        <div id="resetStatus" class="status info">Aguardando teste...</div>
    </div>

    <div id="log">
        <strong>📋 Log de Testes:</strong><br>
    </div>

    <script>
        const BACKEND_URL = 'http://localhost:3000';
        const WS_URL = 'ws://localhost:3000/events';
        let ws = null;

        function log(message, type = 'info') {
            const logDiv = document.getElementById('log');
            const time = new Date().toLocaleTimeString();
            const color = type === 'success' ? '#2ecc71' : type === 'error' ? '#e74c3c' : '#3498db';
            logDiv.innerHTML += `<div class="log-entry" style="color: ${color}">[${time}] ${message}</div>`;
            logDiv.scrollTop = logDiv.scrollHeight;
        }

        async function testBackendConnection() {
            const statusDiv = document.getElementById('connectionStatus');
            log('🔍 Testando conexão HTTP com backend...');

            try {
                const response = await fetch(`${BACKEND_URL}/api/tournament/roster`);
                const data = await response.json();

                statusDiv.className = 'status success';
                statusDiv.textContent = `✅ Backend conectado! Modo torneio: ${data.tournament_mode}, Times: ${data.teams_count}`;
                log(`✅ Backend respondeu: ${JSON.stringify(data)}`, 'success');
            } catch (error) {
                statusDiv.className = 'status error';
                statusDiv.textContent = `❌ Erro: ${error.message}`;
                log(`❌ Erro ao conectar backend: ${error}`, 'error');
            }
        }

        function testWebSocket() {
            const statusDiv = document.getElementById('connectionStatus');
            log('🔍 Testando conexão WebSocket...');

            try {
                ws = new WebSocket(WS_URL);

                ws.onopen = () => {
                    statusDiv.className = 'status success';
                    statusDiv.textContent = '✅ WebSocket conectado!';
                    log('✅ WebSocket conectado com sucesso!', 'success');
                };

                ws.onmessage = (event) => {
                    const message = JSON.parse(event.data);
                    log(`📨 WebSocket message: ${JSON.stringify(message)}`, 'info');
                };

                ws.onerror = (error) => {
                    statusDiv.className = 'status error';
                    statusDiv.textContent = `❌ Erro WebSocket`;
                    log(`❌ Erro WebSocket: ${error}`, 'error');
                };

                ws.onclose = () => {
                    log('⚫ WebSocket desconectado', 'info');
                };
            } catch (error) {
                statusDiv.className = 'status error';
                statusDiv.textContent = `❌ Erro: ${error.message}`;
                log(`❌ Erro ao criar WebSocket: ${error}`, 'error');
            }
        }

        async function loadTestRoster() {
            const statusDiv = document.getElementById('rosterStatus');
            log('🔍 Carregando roster de teste...');

            const testTeams = [
                { tag: 'TEST1', full_name: 'Time Teste 1', players: [] },
                { tag: 'TEST2', full_name: 'Time Teste 2', players: [] },
                { tag: 'TEST3', full_name: 'Time Teste 3', players: [] }
            ];

            try {
                const response = await fetch(`${BACKEND_URL}/api/tournament/roster/manual`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ teams: testTeams })
                });

                const data = await response.json();

                if (data.success) {
                    statusDiv.className = 'status success';
                    statusDiv.textContent = `✅ ${data.message}`;
                    log(`✅ Roster carregado: ${data.message}`, 'success');
                } else {
                    statusDiv.className = 'status error';
                    statusDiv.textContent = `❌ ${data.message}`;
                    log(`❌ Erro ao carregar roster: ${data.message}`, 'error');
                }
            } catch (error) {
                statusDiv.className = 'status error';
                statusDiv.textContent = `❌ Erro: ${error.message}`;
                log(`❌ Erro na requisição: ${error}`, 'error');
            }
        }

        async function testPlayerToggle() {
            const statusDiv = document.getElementById('toggleStatus');
            log('🔍 Testando toggle de player...');

            try {
                const response = await fetch(`${BACKEND_URL}/api/tournament/player/status`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        team_tag: 'TEST1',
                        player_name: 'TEST1_P1',
                        alive: false
                    })
                });

                const data = await response.json();

                if (data.success) {
                    statusDiv.className = 'status success';
                    statusDiv.textContent = `✅ ${data.message}`;
                    log(`✅ Player toggle funcionou: ${data.message}`, 'success');
                } else {
                    statusDiv.className = 'status error';
                    statusDiv.textContent = `❌ Erro ao fazer toggle`;
                    log(`❌ Erro: ${JSON.stringify(data)}`, 'error');
                }
            } catch (error) {
                statusDiv.className = 'status error';
                statusDiv.textContent = `❌ Erro: ${error.message}`;
                log(`❌ Erro na requisição: ${error}`, 'error');
            }
        }

        async function testMatchReset() {
            const statusDiv = document.getElementById('resetStatus');
            log('🔍 Testando reset de match...');

            try {
                const response = await fetch(`${BACKEND_URL}/api/tournament/match/reset`, {
                    method: 'POST'
                });

                const data = await response.json();

                if (data.success) {
                    statusDiv.className = 'status success';
                    statusDiv.textContent = `✅ ${data.message}`;
                    log(`✅ Match resetado com sucesso`, 'success');
                } else {
                    statusDiv.className = 'status error';
                    statusDiv.textContent = `❌ Erro ao resetar`;
                    log(`❌ Erro: ${JSON.stringify(data)}`, 'error');
                }
            } catch (error) {
                statusDiv.className = 'status error';
                statusDiv.textContent = `❌ Erro: ${error.message}`;
                log(`❌ Erro na requisição: ${error}`, 'error');
            }
        }

        async function testClearRoster() {
            const statusDiv = document.getElementById('resetStatus');
            log('🔍 Testando clear roster...');

            try {
                const response = await fetch(`${BACKEND_URL}/api/tournament/roster/clear`, {
                    method: 'POST'
                });

                const data = await response.json();

                if (data.success) {
                    statusDiv.className = 'status success';
                    statusDiv.textContent = `✅ ${data.message}`;
                    log(`✅ Roster limpo com sucesso`, 'success');
                } else {
                    statusDiv.className = 'status error';
                    statusDiv.textContent = `❌ Erro ao limpar`;
                    log(`❌ Erro: ${JSON.stringify(data)}`, 'error');
                }
            } catch (error) {
                statusDiv.className = 'status error';
                statusDiv.textContent = `❌ Erro: ${error.message}`;
                log(`❌ Erro na requisição: ${error}`, 'error');
            }
        }

        // Auto-test ao carregar
        window.addEventListener('load', () => {
            log('🚀 Página de testes carregada. Backend: ' + BACKEND_URL);
        });
    </script>
</body>
</html>
