<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GTA Analytics - Monitor</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #1a1a1a 0%, #2d2d2d 100%);
            color: #00ff00;
            font-family: 'Consolas', 'Monaco', 'Courier New', monospace;
            padding: 40px;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .monitor {
            background: rgba(0, 0, 0, 0.8);
            border: 3px solid #00ff00;
            border-radius: 15px;
            padding: 40px;
            box-shadow: 0 0 30px rgba(0, 255, 0, 0.5);
            max-width: 600px;
            width: 100%;
        }

        h1 {
            text-align: center;
            font-size: 32px;
            margin-bottom: 30px;
            text-shadow: 0 0 20px rgba(0, 255, 0, 0.8);
        }

        .status {
            text-align: center;
            margin: 30px 0;
            padding: 20px;
            background: rgba(0, 255, 0, 0.1);
            border-radius: 10px;
            border: 2px solid #00ff00;
        }

        .status-icon {
            font-size: 48px;
            margin-bottom: 15px;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.1); opacity: 0.7; }
        }

        .status-text {
            font-size: 24px;
            font-weight: bold;
            text-shadow: 0 0 10px rgba(0, 255, 0, 0.6);
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            margin: 30px 0;
        }

        .stat {
            background: rgba(0, 0, 0, 0.6);
            border: 2px solid #00ff00;
            border-radius: 10px;
            padding: 20px;
            text-align: center;
        }

        .stat-label {
            font-size: 14px;
            opacity: 0.8;
            margin-bottom: 10px;
        }

        .stat-value {
            font-size: 36px;
            font-weight: bold;
            color: #00ff00;
            text-shadow: 0 0 15px rgba(0, 255, 0, 0.8);
        }

        .stat-value.large {
            font-size: 28px;
        }

        .info {
            text-align: center;
            margin-top: 20px;
            padding: 15px;
            border-radius: 8px;
            font-size: 14px;
        }

        .success {
            background: rgba(0, 255, 0, 0.2);
            border: 2px solid #00ff00;
            color: #00ff00;
        }

        .error {
            background: rgba(255, 0, 0, 0.2);
            border: 2px solid #ff0000;
            color: #ff0000;
        }

        .warning {
            background: rgba(255, 255, 0, 0.2);
            border: 2px solid #ffff00;
            color: #ffff00;
        }

        .timestamp {
            text-align: center;
            font-size: 12px;
            opacity: 0.6;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="monitor">
        <h1>🎮 GTA ANALYTICS</h1>

        <div class="status success">
            <div class="status-icon">✅</div>
            <div class="status-text">AGUARDANDO SCRIPT PYTHON</div>
        </div>

        <div class="stats-grid">
            <div class="stat">
                <div class="stat-label">📸 Frames Recebidos</div>
                <div class="stat-value" id="frameCount">-</div>
            </div>
            <div class="stat">
                <div class="stat-label">☁️ Processados</div>
                <div class="stat-value" id="processedCount">-</div>
            </div>
            <div class="stat">
                <div class="stat-label">❌ Erros</div>
                <div class="stat-value" id="errorCount">-</div>
            </div>
            <div class="stat">
                <div class="stat-label">⏱️ Último Frame</div>
                <div class="stat-value large" id="lastFrame">--:--:--</div>
            </div>
        </div>

        <div class="info warning">
            ⚠️ Este monitor mostra estatísticas do sistema.<br>
            <strong>Execute o script Python para começar a captura!</strong><br><br>
            Comando: <code>python captura-background-simples.py</code>
        </div>

        <div class="timestamp" id="timestamp">--</div>
    </div>

    <script>
        const GATEWAY_URL = 'https://gta-analytics-gateway.fly.dev';
        const UPDATE_INTERVAL = 2000; // 2 segundos

        // Atualizar timestamp
        setInterval(() => {
            const now = new Date();
            document.getElementById('timestamp').textContent = now.toLocaleString('pt-BR');
        }, 1000);

        // Buscar estatísticas do gateway
        async function updateStats() {
            try {
                const response = await fetch(`${GATEWAY_URL}/stats`, {
                    method: 'GET',
                    cache: 'no-cache'
                });

                if (response.ok) {
                    const data = await response.json();

                    // Atualizar valores
                    document.getElementById('frameCount').textContent = data.frames_received || 0;
                    document.getElementById('processedCount').textContent = data.frames_processed || 0;
                    document.getElementById('errorCount').textContent = data.errors || 0;

                    if (data.last_frame_time) {
                        const time = new Date(data.last_frame_time).toLocaleTimeString('pt-BR');
                        document.getElementById('lastFrame').textContent = time;
                    }

                    console.log('[Stats] Atualizado:', data);
                } else {
                    console.warn('[Stats] Gateway retornou HTTP', response.status);
                }
            } catch (error) {
                console.error('[Stats] Erro ao buscar:', error.message);
            }
        }

        // Atualizar a cada 2 segundos
        setInterval(updateStats, UPDATE_INTERVAL);

        // Primeira atualização
        setTimeout(updateStats, 1000);

        console.log('🎮 GTA Analytics Monitor carregado');
        console.log('Gateway:', GATEWAY_URL);
        console.log('Atualizações a cada', UPDATE_INTERVAL / 1000, 'segundos');
    </script>
</body>
</html>
