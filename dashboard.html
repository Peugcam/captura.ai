<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🍥 Naruto Online - Combat Analyzer Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            background: white;
            border-radius: 15px;
            padding: 30px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .header h1 {
            color: #667eea;
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .header p {
            color: #666;
            font-size: 1.1em;
        }

        .controls {
            background: white;
            border-radius: 15px;
            padding: 30px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .btn-group {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
        }

        button {
            flex: 1;
            padding: 20px;
            font-size: 1.2em;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
        }

        .btn-start {
            background: #48bb78;
            color: white;
        }

        .btn-start:hover {
            background: #38a169;
            transform: translateY(-2px);
        }

        .btn-stop {
            background: #f56565;
            color: white;
        }

        .btn-stop:hover {
            background: #e53e3e;
            transform: translateY(-2px);
        }

        .btn-start:disabled, .btn-stop:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-top: 20px;
        }

        .stat-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
        }

        .stat-value {
            font-size: 2.5em;
            font-weight: bold;
            margin: 10px 0;
        }

        .stat-label {
            font-size: 0.9em;
            opacity: 0.9;
        }

        .log {
            background: white;
            border-radius: 15px;
            padding: 30px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .log h2 {
            color: #667eea;
            margin-bottom: 15px;
        }

        .log-content {
            background: #f7fafc;
            border-radius: 8px;
            padding: 15px;
            height: 300px;
            overflow-y: auto;
            font-family: 'Courier New', monospace;
            font-size: 0.9em;
        }

        .log-entry {
            padding: 5px 0;
            border-bottom: 1px solid #e2e8f0;
        }

        .log-entry:last-child {
            border-bottom: none;
        }

        .status {
            display: inline-block;
            padding: 8px 15px;
            border-radius: 20px;
            font-weight: bold;
            margin-bottom: 15px;
        }

        .status.capturing {
            background: #48bb78;
            color: white;
        }

        .status.stopped {
            background: #cbd5e0;
            color: #4a5568;
        }

        .settings {
            background: white;
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .settings h2 {
            color: #667eea;
            margin-bottom: 20px;
        }

        .setting-item {
            margin-bottom: 20px;
        }

        .setting-item label {
            display: block;
            font-weight: bold;
            margin-bottom: 8px;
            color: #4a5568;
        }

        .setting-item input, .setting-item select {
            width: 100%;
            padding: 12px;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            font-size: 1em;
        }

        .setting-item input:focus, .setting-item select:focus {
            outline: none;
            border-color: #667eea;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🍥 Naruto Online - Combat Analyzer</h1>
            <p>Dashboard de Análise em Tempo Real</p>
        </div>

        <div class="controls">
            <div class="status stopped" id="status">⏸️ Parado</div>

            <div class="btn-group">
                <button class="btn-start" id="btnStart" onclick="startCapture()">
                    ▶️ INICIAR CAPTURA
                </button>
                <button class="btn-stop" id="btnStop" onclick="stopCapture()" disabled>
                    ⏹️ PARAR CAPTURA
                </button>
            </div>

            <div class="stats">
                <div class="stat-card">
                    <div class="stat-label">Frames Capturados</div>
                    <div class="stat-value" id="frameCount">0</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">Eventos Detectados</div>
                    <div class="stat-value" id="eventCount">0</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">Tempo de Captura</div>
                    <div class="stat-value" id="captureTime">0s</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">FPS Médio</div>
                    <div class="stat-value" id="avgFps">0.0</div>
                </div>
            </div>
        </div>

        <div class="log">
            <h2>📋 Log de Eventos</h2>
            <div class="log-content" id="logContent">
                <div class="log-entry">Aguardando início da captura...</div>
            </div>
        </div>

        <div class="settings">
            <h2>⚙️ Configurações</h2>
            <div class="setting-item">
                <label>FPS de Captura:</label>
                <select id="fpsSelect">
                    <option value="1">1 FPS (Econômico)</option>
                    <option value="2" selected>2 FPS (Recomendado)</option>
                    <option value="3">3 FPS (Alta Frequência)</option>
                </select>
            </div>
            <div class="setting-item">
                <label>Qualidade JPEG:</label>
                <select id="qualitySelect">
                    <option value="50">50% (Rápido)</option>
                    <option value="60" selected>60% (Balanceado)</option>
                    <option value="80">80% (Alta Qualidade)</option>
                </select>
            </div>
        </div>
    </div>

    <script>
        let ws = null;
        let capturing = false;
        let frameCount = 0;
        let eventCount = 0;
        let startTime = null;
        let captureInterval = null;
        let statsInterval = null;

        const GATEWAY_WS = 'ws://localhost:8000/ws';

        function addLog(message, type = 'info') {
            const logContent = document.getElementById('logContent');
            const timestamp = new Date().toLocaleTimeString();
            const entry = document.createElement('div');
            entry.className = 'log-entry';
            entry.textContent = `[${timestamp}] ${message}`;
            logContent.appendChild(entry);
            logContent.scrollTop = logContent.scrollHeight;
        }

        let mediaStream = null;
        let videoElement = null;

        async function captureFrame() {
            try {
                if (!videoElement || !mediaStream) {
                    addLog('❌ Sem stream de video ativo');
                    stopCapture();
                    return;
                }

                const canvas = document.createElement('canvas');
                canvas.width = 1920;
                canvas.height = 1080;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(videoElement, 0, 0, canvas.width, canvas.height);

                canvas.toBlob((blob) => {
                    const reader = new FileReader();
                    reader.onloadend = () => {
                        const base64 = reader.result.split(',')[1];
                        sendFrame(base64);
                    };
                    reader.readAsDataURL(blob);
                }, 'image/jpeg', parseInt(document.getElementById('qualitySelect').value) / 100);

            } catch (error) {
                addLog(`❌ Erro ao capturar frame: ${error.message}`, 'error');
                stopCapture();
            }
        }

        function sendFrame(frameData) {
            if (ws && ws.readyState === WebSocket.OPEN) {
                const message = {
                    type: 'frame',
                    data: frameData,
                    timestamp: Date.now()
                };
                ws.send(JSON.stringify(message));
                frameCount++;
                document.getElementById('frameCount').textContent = frameCount;
            }
        }

        async function startCapture() {
            if (capturing) return;

            frameCount = 0;
            eventCount = 0;
            startTime = Date.now();

            addLog('🔄 Conectando ao WebSocket Gateway...');

            ws = new WebSocket(GATEWAY_WS);

            ws.onopen = async () => {
                addLog('✅ Conectado ao gateway!');
                ws.send(JSON.stringify({ type: 'start_capture' }));

                // Solicitar compartilhamento ANTES de iniciar captura
                try {
                    addLog('📺 Selecione a janela para compartilhar...');

                    mediaStream = await navigator.mediaDevices.getDisplayMedia({
                        video: { mediaSource: 'screen' }
                    });

                    videoElement = document.createElement('video');
                    videoElement.srcObject = mediaStream;
                    videoElement.play();

                    // Se usuario parar o compartilhamento, parar captura automaticamente
                    mediaStream.getVideoTracks()[0].onended = () => {
                        addLog('🛑 Compartilhamento de tela encerrado');
                        stopCapture();
                    };

                    await new Promise(resolve => {
                        videoElement.onloadedmetadata = resolve;
                    });

                    addLog('✅ Compartilhamento iniciado!');

                } catch (error) {
                    addLog('❌ Compartilhamento cancelado ou erro: ' + error.message);
                    stopCapture();
                    return;
                }

                capturing = true;
                document.getElementById('status').textContent = '🎬 Capturando';
                document.getElementById('status').className = 'status capturing';
                document.getElementById('btnStart').disabled = true;
                document.getElementById('btnStop').disabled = false;

                const fps = parseInt(document.getElementById('fpsSelect').value);
                const interval = 1000 / fps;

                captureInterval = setInterval(() => {
                    captureFrame();
                }, interval);

                statsInterval = setInterval(() => {
                    const elapsed = (Date.now() - startTime) / 1000;
                    document.getElementById('captureTime').textContent = elapsed.toFixed(0) + 's';
                    const avgFps = frameCount / elapsed;
                    document.getElementById('avgFps').textContent = avgFps.toFixed(1);
                }, 1000);

                addLog('▶️ Captura iniciada!');
            };

            ws.onerror = (error) => {
                addLog(`❌ Erro de conexão: ${error.message}`, 'error');
            };

            ws.onclose = () => {
                addLog('🔌 Desconectado do gateway');
            };

            ws.onmessage = (event) => {
                const data = JSON.parse(event.data);
                if (data.type === 'ack') {
                    addLog(`📨 ${data.message}`);
                }
            };
        }

        function stopCapture() {
            if (!capturing) return;

            clearInterval(captureInterval);
            clearInterval(statsInterval);

            // Parar stream de video
            if (mediaStream) {
                mediaStream.getTracks().forEach(track => track.stop());
                mediaStream = null;
                videoElement = null;
            }

            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({ type: 'stop_capture' }));
                ws.close();
            }

            capturing = false;
            document.getElementById('status').textContent = '⏸️ Parado';
            document.getElementById('status').className = 'status stopped';
            document.getElementById('btnStart').disabled = false;
            document.getElementById('btnStop').disabled = true;

            addLog('⏹️ Captura parada');
            addLog(`📊 Resumo: ${frameCount} frames capturados`);
        }
    </script>
</body>
</html>
