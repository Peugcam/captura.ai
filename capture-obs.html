<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GTA Analytics - OBS Capture</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: rgba(0, 0, 0, 0.85);
            color: #00ff00;
            font-family: 'Consolas', 'Monaco', 'Courier New', monospace;
            padding: 30px;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .header {
            background: linear-gradient(135deg, rgba(0, 255, 0, 0.1), rgba(0, 200, 0, 0.05));
            border: 2px solid #00ff00;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 0 20px rgba(0, 255, 0, 0.3);
        }

        h1 {
            font-size: 28px;
            margin-bottom: 10px;
            text-shadow: 0 0 10px rgba(0, 255, 0, 0.8);
        }

        .status-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin-top: 20px;
        }

        .stat-box {
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid #00ff00;
            border-radius: 8px;
            padding: 15px;
            transition: all 0.3s ease;
        }

        .stat-box:hover {
            background: rgba(0, 255, 0, 0.1);
            box-shadow: 0 0 15px rgba(0, 255, 0, 0.4);
        }

        .stat-label {
            font-size: 12px;
            opacity: 0.7;
            margin-bottom: 5px;
        }

        .stat-value {
            font-size: 32px;
            font-weight: bold;
            text-shadow: 0 0 10px rgba(0, 255, 0, 0.6);
        }

        .status-indicator {
            display: inline-block;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            margin-right: 8px;
            animation: pulse 2s infinite;
        }

        .status-indicator.connected {
            background: #00ff00;
            box-shadow: 0 0 10px #00ff00;
        }

        .status-indicator.disconnected {
            background: #ff0000;
            box-shadow: 0 0 10px #ff0000;
        }

        .status-indicator.uploading {
            background: #ffff00;
            box-shadow: 0 0 10px #ffff00;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .log-container {
            flex: 1;
            background: rgba(0, 0, 0, 0.7);
            border: 1px solid #00ff00;
            border-radius: 8px;
            padding: 15px;
            overflow-y: auto;
            margin-top: 20px;
            font-size: 12px;
        }

        .log-entry {
            padding: 5px 0;
            border-bottom: 1px solid rgba(0, 255, 0, 0.1);
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(-20px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .log-time {
            opacity: 0.5;
            margin-right: 10px;
        }

        .log-success { color: #00ff00; }
        .log-error { color: #ff0000; }
        .log-warning { color: #ffff00; }
        .log-info { color: #00ccff; }

        .footer {
            margin-top: 20px;
            text-align: center;
            font-size: 11px;
            opacity: 0.5;
        }

        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: rgba(0, 0, 0, 0.3);
        }

        ::-webkit-scrollbar-thumb {
            background: #00ff00;
            border-radius: 4px;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>🎮 GTA Analytics - OBS Capture</h1>
        <div style="font-size: 14px; margin-top: 5px;">
            <span class="status-indicator connected" id="statusDot"></span>
            <span id="statusText">Iniciando...</span>
        </div>
    </div>

    <div class="status-grid">
        <div class="stat-box">
            <div class="stat-label">Frames Capturados</div>
            <div class="stat-value" id="frameCount">0</div>
        </div>
        <div class="stat-box">
            <div class="stat-label">Uploads Sucesso</div>
            <div class="stat-value" id="uploadCount">0</div>
        </div>
        <div class="stat-box">
            <div class="stat-label">Erros</div>
            <div class="stat-value" id="errorCount">0</div>
        </div>
        <div class="stat-box">
            <div class="stat-label">Último Upload</div>
            <div class="stat-value" id="lastUpload" style="font-size: 20px;">--:--:--</div>
        </div>
    </div>

    <div class="log-container" id="logContainer">
        <div class="log-entry log-info">
            <span class="log-time">--:--:--</span>
            Sistema iniciado. Aguardando conexão...
        </div>
    </div>

    <div class="footer">
        GTA Analytics v2.0 | Desenvolvido para uso com OBS Studio
    </div>

    <canvas id="canvas" style="display: none;"></canvas>

    <script>
        // Configuração
        const GATEWAY_URL = 'https://gta-analytics-gateway.fly.dev';
        const CAPTURE_INTERVAL = 1000; // 1 segundo
        const MAX_LOG_ENTRIES = 50;

        // Estado
        let frameCount = 0;
        let uploadCount = 0;
        let errorCount = 0;
        let isCapturing = false;
        let captureInterval = null;

        // Elementos DOM
        const statusDot = document.getElementById('statusDot');
        const statusText = document.getElementById('statusText');
        const frameCountEl = document.getElementById('frameCount');
        const uploadCountEl = document.getElementById('uploadCount');
        const errorCountEl = document.getElementById('errorCount');
        const lastUploadEl = document.getElementById('lastUpload');
        const logContainer = document.getElementById('logContainer');

        // Logging
        function log(message, type = 'info') {
            const time = new Date().toLocaleTimeString();
            const entry = document.createElement('div');
            entry.className = `log-entry log-${type}`;
            entry.innerHTML = `<span class="log-time">${time}</span>${message}`;

            logContainer.insertBefore(entry, logContainer.firstChild);

            // Limitar número de logs
            while (logContainer.children.length > MAX_LOG_ENTRIES) {
                logContainer.removeChild(logContainer.lastChild);
            }
        }

        // Atualizar status
        function updateStatus(status, message) {
            statusDot.className = `status-indicator ${status}`;
            statusText.textContent = message;
        }

        // Capturar frame via MediaDevices
        async function captureFrame() {
            if (isCapturing) {
                log('⏭️ Captura anterior em andamento, pulando...', 'warning');
                return;
            }

            try {
                isCapturing = true;
                updateStatus('uploading', 'Capturando frame...');

                // Capturar tela usando getDisplayMedia
                // IMPORTANTE: Quando a janela de permissão aparecer, selecione:
                // - "Janela: Grand Theft Auto V" (RECOMENDADO) - Funciona com qualquer resolução
                // - OU "Tela Inteira" - Se quiser capturar tudo
                const stream = await navigator.mediaDevices.getDisplayMedia({
                    video: {
                        // Aceita qualquer resolução (1920x1080, 1100x1080, etc.)
                        frameRate: { ideal: 1, max: 1 }
                    },
                    audio: false // Não precisa de áudio
                });

                const video = document.createElement('video');
                video.srcObject = stream;
                video.muted = true;
                await video.play();

                // Aguardar frame estar pronto
                await new Promise(resolve => setTimeout(resolve, 100));

                const canvas = document.getElementById('canvas');
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;

                // Log da resolução detectada (primeira vez)
                if (frameCount === 0) {
                    log(`📐 Resolução detectada: ${video.videoWidth}x${video.videoHeight}`, 'success');
                }

                const ctx = canvas.getContext('2d');
                ctx.drawImage(video, 0, 0);

                // Parar stream
                stream.getTracks().forEach(track => track.stop());

                // Converter para blob
                const blob = await new Promise(resolve =>
                    canvas.toBlob(resolve, 'image/jpeg', 0.85)
                );

                frameCount++;
                frameCountEl.textContent = frameCount;

                // Enviar para gateway
                await uploadFrame(blob);

            } catch (error) {
                if (error.name === 'NotAllowedError') {
                    log('❌ Permissão de captura negada. Por favor, permita captura de tela.', 'error');
                    errorCount++;
                    errorCountEl.textContent = errorCount;
                    updateStatus('disconnected', 'Permissão negada');
                } else {
                    log(`❌ Erro ao capturar: ${error.message}`, 'error');
                    errorCount++;
                    errorCountEl.textContent = errorCount;
                    updateStatus('disconnected', 'Erro na captura');
                }
            } finally {
                isCapturing = false;
            }
        }

        // Upload frame para gateway
        async function uploadFrame(blob) {
            try {
                updateStatus('uploading', 'Enviando para nuvem...');

                const formData = new FormData();
                formData.append('file', blob, 'frame.jpg');

                const response = await fetch(`${GATEWAY_URL}/upload`, {
                    method: 'POST',
                    body: formData
                });

                if (response.ok) {
                    uploadCount++;
                    uploadCountEl.textContent = uploadCount;

                    const now = new Date().toLocaleTimeString();
                    lastUploadEl.textContent = now;

                    updateStatus('connected', '🟢 Conectado e capturando');
                    log(`✅ Frame #${frameCount} enviado com sucesso`, 'success');
                } else {
                    throw new Error(`HTTP ${response.status}: ${await response.text()}`);
                }

            } catch (error) {
                errorCount++;
                errorCountEl.textContent = errorCount;
                updateStatus('disconnected', '🔴 Erro no upload');
                log(`❌ Erro ao enviar frame: ${error.message}`, 'error');
            }
        }

        // Iniciar captura automática
        async function startCapture() {
            log('🚀 Iniciando sistema de captura...', 'info');

            // Testar conexão com gateway
            try {
                const response = await fetch(`${GATEWAY_URL}/health`);
                if (response.ok) {
                    log('✅ Gateway online e acessível', 'success');
                    updateStatus('connected', '🟢 Conectado ao gateway');
                } else {
                    throw new Error('Gateway não respondeu');
                }
            } catch (error) {
                log(`⚠️ Aviso: Não foi possível conectar ao gateway: ${error.message}`, 'warning');
                updateStatus('disconnected', '🔴 Gateway offline');
            }

            // Solicitar permissão e iniciar captura
            log('📸 Solicitando permissão de captura de tela...', 'info');

            // Primeira captura para obter permissão
            await captureFrame();

            // Iniciar intervalo de captura
            if (captureInterval) {
                clearInterval(captureInterval);
            }

            captureInterval = setInterval(captureFrame, CAPTURE_INTERVAL);
            log(`⏱️ Captura automática iniciada (${CAPTURE_INTERVAL}ms)`, 'success');
        }

        // Inicializar quando página carregar
        window.addEventListener('load', () => {
            log('📺 OBS Browser Source detectado', 'info');
            log(`🌐 Gateway: ${GATEWAY_URL}`, 'info');

            // Aguardar 2 segundos antes de iniciar
            setTimeout(startCapture, 2000);
        });

        // Cleanup ao fechar
        window.addEventListener('beforeunload', () => {
            if (captureInterval) {
                clearInterval(captureInterval);
            }
            log('👋 Encerrando captura...', 'info');
        });
    </script>
</body>
</html>
