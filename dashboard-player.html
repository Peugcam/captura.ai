<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GTA Analytics - Jogador</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', 'Segoe UI', sans-serif;
            background: transparent;
            overflow: hidden;
            height: 100vh;
        }

        /* BOTÃO FLUTUANTE */
        .floating-control {
            position: fixed;
            top: 20px;
            right: 20px;
            background: linear-gradient(145deg, #1a1d24 0%, #151820 100%);
            border: 2px solid #2a2d35;
            border-radius: 12px;
            padding: 12px 16px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.6);
            z-index: 9999;
            cursor: move;
            user-select: none;
            display: flex;
            align-items: center;
            gap: 12px;
            transition: all 0.3s ease;
        }

        .floating-control:hover {
            transform: scale(1.05);
            box-shadow: 0 12px 48px rgba(0, 0, 0, 0.8);
        }

        .floating-control.minimized {
            padding: 8px;
            border-radius: 50%;
            width: 48px;
            height: 48px;
            justify-content: center;
        }

        .floating-control.minimized .control-content {
            display: none;
        }

        .floating-control.minimized .minimize-btn {
            display: none;
        }

        .floating-control.minimized .expand-btn {
            display: block !important;
        }

        /* STATUS INDICATOR */
        .status-indicator {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #6b7280;
            transition: all 0.3s;
        }

        .status-indicator.active {
            background: #10b981;
            box-shadow: 0 0 12px rgba(16, 185, 129, 0.6);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.6; }
        }

        /* CONTEÚDO DO CONTROLE */
        .control-content {
            display: flex;
            align-items: center;
            gap: 12px;
            color: #ffffff;
        }

        .control-text {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .control-label {
            font-size: 11px;
            color: #9ca3af;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .control-status {
            font-size: 14px;
            font-weight: 600;
            color: #ffffff;
        }

        /* BOTÕES */
        .btn {
            padding: 8px 16px;
            border: none;
            border-radius: 6px;
            font-weight: 600;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 6px;
            background: transparent;
            color: #ffffff;
        }

        .btn:hover {
            transform: scale(1.1);
        }

        .btn-start {
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
        }

        .btn-stop {
            background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%);
        }

        .minimize-btn, .expand-btn {
            background: transparent;
            border: none;
            color: #6b7280;
            font-size: 16px;
            cursor: pointer;
            padding: 4px;
            transition: all 0.2s;
        }

        .minimize-btn:hover, .expand-btn:hover {
            color: #ffffff;
            transform: scale(1.2);
        }

        .expand-btn {
            display: none;
        }

        /* STATS MINI */
        .mini-stats {
            display: flex;
            gap: 8px;
            font-size: 11px;
            color: #6b7280;
        }

        .mini-stat {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .mini-stat-value {
            color: #10b981;
            font-weight: 700;
        }

        /* DRAGGING STATE */
        .floating-control.dragging {
            opacity: 0.8;
            cursor: grabbing;
        }

        /* HIDDEN VIDEO (para captura) */
        #captureVideo {
            position: absolute;
            top: -9999px;
            left: -9999px;
            width: 1px;
            height: 1px;
        }
    </style>
</head>
<body>
    <!-- VÍDEO OCULTO PARA CAPTURA -->
    <video id="captureVideo" autoplay muted playsinline></video>

    <!-- BOTÃO FLUTUANTE -->
    <div class="floating-control" id="floatingControl">
        <div class="status-indicator" id="statusIndicator"></div>

        <div class="control-content">
            <div class="control-text">
                <span class="control-label">GTA Analytics</span>
                <span class="control-status" id="controlStatus">Pronto</span>
            </div>

            <div class="mini-stats" id="miniStats" style="display: none;">
                <div class="mini-stat">
                    <span>📸</span>
                    <span class="mini-stat-value" id="frameCount">0</span>
                </div>
                <div class="mini-stat">
                    <span>⏱️</span>
                    <span class="mini-stat-value" id="captureTime">0s</span>
                </div>
            </div>

            <button class="btn btn-start" id="btnAction">
                <span>▶️</span>
                <span id="btnText">Iniciar</span>
            </button>
        </div>

        <button class="minimize-btn" id="btnMinimize" title="Minimizar">−</button>
        <button class="expand-btn" id="btnExpand" title="Expandir">+</button>
    </div>

    <script>
        let ws = null;
        let capturing = false;
        let frameCount = 0;
        let startTime = null;
        let captureInterval = null;
        let statsInterval = null;
        let mediaStream = null;
        let videoElement = null;

        // Posição e dragging
        let isDragging = false;
        let dragOffsetX = 0;
        let dragOffsetY = 0;

        // WebSocket URLs
        const getWebSocketUrl = (path) => {
            const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            const host = window.location.hostname;

            // Se estiver abrindo como file:// (host vazio), usar localhost:3000
            if (!host || host === '' || window.location.protocol === 'file:') {
                return `ws://localhost:3000${path}`;
            }

            if (host === 'localhost' || host === '127.0.0.1') {
                return `${protocol}//${host}:3000${path}`;
            }
            return `${protocol}//${host}${path}`;
        };

        const CAPTURE_WS = getWebSocketUrl('/capture');

        // DRAG AND DROP
        const floatingControl = document.getElementById('floatingControl');

        floatingControl.addEventListener('mousedown', startDrag);
        document.addEventListener('mousemove', drag);
        document.addEventListener('mouseup', stopDrag);

        function startDrag(e) {
            if (e.target.tagName === 'BUTTON') return; // Não arrastar se clicar em botão

            isDragging = true;
            floatingControl.classList.add('dragging');

            const rect = floatingControl.getBoundingClientRect();
            dragOffsetX = e.clientX - rect.left;
            dragOffsetY = e.clientY - rect.top;
        }

        function drag(e) {
            if (!isDragging) return;

            e.preventDefault();

            let x = e.clientX - dragOffsetX;
            let y = e.clientY - dragOffsetY;

            // Limitar às bordas da tela
            const maxX = window.innerWidth - floatingControl.offsetWidth;
            const maxY = window.innerHeight - floatingControl.offsetHeight;

            x = Math.max(0, Math.min(x, maxX));
            y = Math.max(0, Math.min(y, maxY));

            floatingControl.style.left = x + 'px';
            floatingControl.style.top = y + 'px';
            floatingControl.style.right = 'auto';
        }

        function stopDrag() {
            isDragging = false;
            floatingControl.classList.remove('dragging');
        }

        // MINIMIZAR/EXPANDIR
        document.getElementById('btnMinimize').addEventListener('click', (e) => {
            e.stopPropagation();
            floatingControl.classList.add('minimized');
        });

        document.getElementById('btnExpand').addEventListener('click', (e) => {
            e.stopPropagation();
            floatingControl.classList.remove('minimized');
        });

        // CAPTURA
        async function startCapture() {
            if (capturing) return;

            frameCount = 0;
            startTime = Date.now();

            try {
                // Conectar WebSocket
                ws = new WebSocket(CAPTURE_WS);

                ws.onopen = async () => {
                    console.log('✅ WebSocket conectado');
                    ws.send(JSON.stringify({ type: 'start_capture' }));

                    try {
                        // Pedir permissão de captura
                        mediaStream = await navigator.mediaDevices.getDisplayMedia({
                            video: { mediaSource: 'screen' }
                        });

                        videoElement = document.getElementById('captureVideo');
                        videoElement.srcObject = mediaStream;

                        await videoElement.play();

                        mediaStream.getVideoTracks()[0].onended = () => {
                            stopCapture();
                        };

                        capturing = true;
                        updateUI();

                        // Capturar a 2 FPS
                        const fps = 2;
                        const interval = 1000 / fps;

                        captureInterval = setInterval(() => {
                            captureFrame();
                        }, interval);

                        statsInterval = setInterval(() => {
                            const elapsed = Math.floor((Date.now() - startTime) / 1000);
                            document.getElementById('captureTime').textContent = elapsed + 's';
                        }, 1000);

                    } catch (error) {
                        console.error('❌ Erro ao obter captura:', error);
                        if (ws) ws.close();
                        alert('Erro ao capturar tela. Verifique as permissões.');
                    }
                };

                ws.onerror = (error) => {
                    console.error('❌ Erro no WebSocket:', error);
                    alert('Erro ao conectar. Verifique se o backend está rodando.');
                };

                ws.onclose = () => {
                    console.log('⚠️ WebSocket fechado');
                };

            } catch (error) {
                console.error('❌ Erro ao iniciar:', error);
            }
        }

        function captureFrame() {
            try {
                if (!videoElement || !mediaStream) return;

                const canvas = document.createElement('canvas');
                canvas.width = 1920;
                canvas.height = 1080;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(videoElement, 0, 0, canvas.width, canvas.height);

                canvas.toBlob((blob) => {
                    const reader = new FileReader();
                    reader.onloadend = () => {
                        const base64 = reader.result.split(',')[1];
                        sendFrame(base64);
                    };
                    reader.readAsDataURL(blob);
                }, 'image/jpeg', 0.6);

            } catch (error) {
                console.error('❌ Erro ao capturar frame:', error);
            }
        }

        function sendFrame(frameData) {
            if (ws && ws.readyState === WebSocket.OPEN) {
                const message = {
                    type: 'frame',
                    data: frameData,
                    timestamp: Date.now()
                };
                ws.send(JSON.stringify(message));
                frameCount++;
                document.getElementById('frameCount').textContent = frameCount;
            }
        }

        function stopCapture() {
            if (!capturing) return;

            clearInterval(captureInterval);
            clearInterval(statsInterval);

            if (mediaStream) {
                mediaStream.getTracks().forEach(track => track.stop());
                mediaStream = null;
            }

            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({ type: 'stop_capture' }));
                ws.close();
            }

            capturing = false;
            updateUI();
        }

        function updateUI() {
            const statusIndicator = document.getElementById('statusIndicator');
            const controlStatus = document.getElementById('controlStatus');
            const btnAction = document.getElementById('btnAction');
            const btnText = document.getElementById('btnText');
            const miniStats = document.getElementById('miniStats');

            if (capturing) {
                statusIndicator.classList.add('active');
                controlStatus.textContent = 'Capturando';
                btnAction.className = 'btn btn-stop';
                btnText.textContent = 'Parar';
                btnAction.innerHTML = '<span>⏹️</span><span>Parar</span>';
                miniStats.style.display = 'flex';
            } else {
                statusIndicator.classList.remove('active');
                controlStatus.textContent = 'Pronto';
                btnAction.className = 'btn btn-start';
                btnText.textContent = 'Iniciar';
                btnAction.innerHTML = '<span>▶️</span><span>Iniciar</span>';
                miniStats.style.display = 'none';
            }
        }

        // BOTÃO ACTION (Iniciar/Parar)
        document.getElementById('btnAction').addEventListener('click', (e) => {
            e.stopPropagation();
            if (capturing) {
                stopCapture();
            } else {
                startCapture();
            }
        });

        // ATALHO DE TECLADO: F9
        document.addEventListener('keydown', (e) => {
            if (e.key === 'F9') {
                e.preventDefault();
                if (capturing) {
                    stopCapture();
                } else {
                    startCapture();
                }
            }
        });

        console.log('🎮 Dashboard do Jogador carregado!');
        console.log('💡 Dica: Pressione F9 para iniciar/parar a captura');
    </script>
</body>
</html>
