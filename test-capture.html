<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teste WebSocket Capture</title>
    <style>
        body {
            font-family: monospace;
            padding: 20px;
            background: #1a1a1a;
            color: #00ff00;
        }
        button {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            margin: 10px 5px;
        }
        #log {
            background: #000;
            padding: 15px;
            margin-top: 20px;
            border: 1px solid #00ff00;
            height: 400px;
            overflow-y: auto;
        }
        .success { color: #00ff00; }
        .error { color: #ff0000; }
        .info { color: #00aaff; }
    </style>
</head>
<body>
    <h1>🔍 Teste de Conexão WebSocket /capture</h1>

    <div>
        <button onclick="testConnection()">🔌 Testar Conexão</button>
        <button onclick="sendTestFrame()">📸 Enviar Frame de Teste</button>
        <button onclick="clearLog()">🗑️ Limpar Log</button>
    </div>

    <div id="log"></div>

    <script>
        let ws = null;

        function log(message, type = 'info') {
            const logDiv = document.getElementById('log');
            const timestamp = new Date().toLocaleTimeString('pt-BR');
            const className = type;
            logDiv.innerHTML += `<div class="${className}">[${timestamp}] ${message}</div>`;
            logDiv.scrollTop = logDiv.scrollHeight;
            console.log(message);
        }

        function clearLog() {
            document.getElementById('log').innerHTML = '';
        }

        function testConnection() {
            log('🔄 Iniciando teste de conexão...', 'info');

            const wsUrl = 'ws://localhost:3000/capture';
            log(`📡 Tentando conectar em: ${wsUrl}`, 'info');

            try {
                ws = new WebSocket(wsUrl);

                ws.onopen = () => {
                    log('✅ WebSocket CONECTADO com sucesso!', 'success');
                    log('📤 Enviando mensagem start_capture...', 'info');
                    ws.send(JSON.stringify({ type: 'start_capture' }));
                };

                ws.onmessage = (event) => {
                    log(`📨 Mensagem recebida: ${event.data}`, 'success');
                };

                ws.onerror = (error) => {
                    log(`❌ ERRO no WebSocket: ${JSON.stringify(error)}`, 'error');
                    log(`❌ Verifique se o backend está rodando em localhost:3000`, 'error');
                };

                ws.onclose = (event) => {
                    log(`⚠️ WebSocket FECHADO (code: ${event.code}, reason: ${event.reason})`, 'error');
                };

            } catch (error) {
                log(`❌ Erro ao criar WebSocket: ${error.message}`, 'error');
            }
        }

        function sendTestFrame() {
            if (!ws || ws.readyState !== WebSocket.OPEN) {
                log('❌ WebSocket não está conectado! Clique em "Testar Conexão" primeiro.', 'error');
                return;
            }

            log('📸 Gerando frame de teste...', 'info');

            // Criar um canvas pequeno com dados de teste
            const canvas = document.createElement('canvas');
            canvas.width = 100;
            canvas.height = 100;
            const ctx = canvas.getContext('2d');

            // Desenhar algo simples
            ctx.fillStyle = '#ff0000';
            ctx.fillRect(0, 0, 100, 100);
            ctx.fillStyle = '#ffffff';
            ctx.font = '20px Arial';
            ctx.fillText('TEST', 20, 50);

            // Converter para base64
            canvas.toBlob((blob) => {
                const reader = new FileReader();
                reader.onloadend = () => {
                    const base64 = reader.result.split(',')[1];

                    const message = {
                        type: 'frame',
                        data: base64,
                        timestamp: Date.now()
                    };

                    log(`📤 Enviando frame de teste (${base64.length} bytes)...`, 'info');
                    ws.send(JSON.stringify(message));
                    log('✅ Frame enviado!', 'success');
                };
                reader.readAsDataURL(blob);
            }, 'image/jpeg', 0.8);
        }

        log('✨ Teste de captura carregado. Clique em "Testar Conexão" para começar.', 'success');
        log('🎯 Backend esperado em: ws://localhost:3000/capture', 'info');
    </script>
</body>
</html>
