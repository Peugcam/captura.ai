# Fly.io App Configuration
# GTA Analytics V2 - Sistema de Análise de Kill Feed
# Cliente: Luis Otavio

app = "gta-analytics-v2"
primary_region = "gru"  # São Paulo, Brasil (menor latência)

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "8080"
  GATEWAY_PORT = "8000"
  BACKEND_PORT = "3000"
  PYTHON_VERSION = "3.11"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

  [http_service.concurrency]
    type = "connections"
    hard_limit = 100
    soft_limit = 80

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 1024

[mounts]
  source = "gta_analytics_data"
  destination = "/data"

[deploy]
  strategy = "rolling"

[processes]
  app = "python backend/main_websocket.py"
