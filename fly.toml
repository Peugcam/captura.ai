# Fly.io App Configuration
# GTA Analytics V2 - Sistema de Análise de Kill Feed
# Cliente: Luis Otavio

app = "gta-analytics-v2"
primary_region = "gru"  # São Paulo, Brasil (menor latência)

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "8080"
  GATEWAY_PORT = "8000"
  BACKEND_PORT = "3000"
  PYTHON_VERSION = "3.11"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

  [http_service.concurrency]
    type = "connections"
    hard_limit = 100
    soft_limit = 80

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 1024

[mounts]
  source = "gta_analytics_data"
  destination = "/data"

[[services]]
  protocol = "tcp"
  internal_port = 8080
  processes = ["app"]

  [[services.ports]]
    port = 80
    handlers = ["http"]
    force_https = true

  [[services.ports]]
    port = 443
    handlers = ["tls", "http"]

  [services.concurrency]
    type = "connections"
    hard_limit = 100
    soft_limit = 80

  [[services.tcp_checks]]
    interval = "15s"
    timeout = "2s"
    grace_period = "5s"
    restart_limit = 0

  [[services.http_checks]]
    interval = "30s"
    timeout = "5s"
    grace_period = "10s"
    method = "get"
    path = "/health"
    protocol = "http"
    restart_limit = 0

[deploy]
  strategy = "rolling"

[[services]]
  protocol = "tcp"
  internal_port = 8000
  processes = ["gateway"]

  [[services.ports]]
    port = 8000

[[services]]
  protocol = "tcp"
  internal_port = 3000
  processes = ["backend"]

  [[services.ports]]
    port = 3000
