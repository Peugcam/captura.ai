<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta http-equiv="refresh" content="0;url=dashboard-v2.html?v=2">
    <title>Redirecting...</title>
</head>
<body>
    <p>Atualizando dashboard... <a href="dashboard-v2.html?v=2">Clique aqui</a> se não redirecionar.</p>
    <script>
        // Force cache clear
        if ('caches' in window) {
            caches.keys().then(function(names) {
                names.forEach(function(name) {
                    caches.delete(name);
                });
            });
        }
        // Clear localStorage
        localStorage.clear();
        // Redirect
        setTimeout(() => {
            window.location.href = 'dashboard-v2.html?v=' + Date.now();
        }, 500);
    </script>
</body>
</html>
